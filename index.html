const explanations={
"The REPL Loop":"REPL stands for Read\u2013Evaluate\u2013Print\u2013Loop. Every time you type something, Claude reads your input plus everything in the context window, evaluates what to do \u2014 running a command, editing a file, calling a tool \u2014 prints the result, then waits for your next input. This is what makes Claude Code different from a chatbot: it can act across multiple steps, learn from each result, and build on prior work within the same session.",
"Context Window":"The context window is everything Claude can see during a session \u2014 your messages, its replies, files it has read, tool outputs, and any instructions like CLAUDE.md. Think of it as short-term working memory. Once you close a session it resets, which is why persistent files like CLAUDE.md matter: they give Claude a way to reload essential context at the start of every new session.",
"Actions vs. Answers":"In a normal chat, Claude responds with text. In Claude Code, Claude can also take actions: read and write files, run bash commands, search the web, call APIs, edit code, run tests. You are not just getting a smarter Google \u2014 you are getting an agent that can execute work. Ask it to build a prototype and it builds one.",
"CC vs Claude.ai":"Claude.ai is a chat interface \u2014 great for thinking, drafting, and exploring ideas. Claude Code is an agent environment built for execution. Use Claude.ai when you want to think through a strategy. Use Claude Code when you want to produce something: a prototype, a PRD, a data analysis, a workflow.",
"Interview Before Build":"The single most important habit in this course: before Claude builds anything, it should interview you. This means running in plan mode first \u2014 Claude asks clarifying questions, synthesizes what it heard, presents a plan, and only starts building once you approve. Skipping the interview gets you output fast but wrong.",
"Plan Mode":"Plan mode is a structured sequence: Claude interviews you one question at a time, synthesizes what it heard back in plain language, presents a step-by-step plan. You review and approve \u2014 or correct \u2014 before a single file gets written. This prevents the most common failure mode: Claude building confidently in the wrong direction.",
"95% Confidence Threshold":"In plan mode, Claude should keep interviewing until it can explain back your actual need with at least 95% accuracy \u2014 not just what you said, but what you meant. There is often a gap between 'a dashboard for our weekly metrics' and what you actually need. The interview collapses that gap before any work starts.",
"One Question at a Time":"When Claude interviews you, it should ask one question at a time, not a list of ten. A list gets shallow, rushed answers. A single question invites a real answer \u2014 you think, you elaborate, you surface context you did not know was relevant. Sequential questioning also lets Claude follow threads.",
"CLAUDE.md":"CLAUDE.md is a special file you place in your project folder. Claude Code reads it automatically every time you start a new session in that folder. It is where you store everything Claude should always know: what your product is, who your users are, your writing style, your team conventions. Without it, every session starts cold.",
"Project Memory":"Project memory is the set of facts about your product that should not change from session to session: the product name, the target user, the core metric, the tech stack, key decisions already made. This lives in CLAUDE.md or project.md. Never explain the same thing twice.",
"Session vs. Persistent":"Session memory is everything Claude holds in its context window during a conversation \u2014 rich but gone when the session ends. Persistent memory is what lives in files Claude reads at session start \u2014 limited but durable. Good Claude Code setup bridges the two: you use the session for the work, and you update the persistent files with decisions that should carry forward.",
"Living Document":"CLAUDE.md is not a setup task you do once. It should change every time something important changes about your project \u2014 a new strategic direction, a different target user, a locked decision. Treat it like a briefing document for a new team member: keep it current and it saves hours of onboarding every time.",
"project.md":"project.md is the foundation. It describes what you are building, who it is for, what problem it solves, and what success looks like in concrete terms. Every Claude session that involves product work should reference this file. It is more fundamental than a PRD.",
"strategy.md":"strategy.md is where Claude writes your current strategic direction \u2014 the bets you are making, the priorities for this quarter, the rationale behind key decisions. Unlike project.md which is relatively stable, strategy.md changes as your thinking evolves. Claude updates it during sessions when a decision gets made.",
"change_log.md":"change_log.md is your decision audit trail. Every significant change to your product direction or priorities gets logged here with a date and the reasoning. This is the file you are grateful for six months later when someone asks why did we decide to drop that feature.",
"Chat to Code handoff":"The handoff pattern: do your exploratory thinking and drafting in Claude.ai, then move to Claude Code when you are ready to produce artifacts. Pass context between the two via your core files \u2014 paste the relevant sections into Claude Code context at the start of the session.",
"SKILL.md Files":"A SKILL.md file is a reusable instruction package for a specific type of task. You write it once \u2014 describing the task, the format, the quality bar, any examples \u2014 and Claude reads it whenever that task comes up. Instead of re-explaining how you want a PRD formatted every session, you have a PRD skill that encodes all of that.",
"Trigger Conditions":"Each skill has trigger conditions \u2014 a description of when to apply it. Good trigger conditions are specific enough that Claude knows exactly when to load the skill, but not so narrow that it misses relevant cases. Write them as you would write a brief for a smart assistant.",
"Prompt Templates":"Prompt templates are prompts with placeholders \u2014 [USER_SEGMENT], [FEATURE_NAME], [SUCCESS_METRIC] \u2014 that you fill in each time. They encode your best prompting practice for a task so you never have to reconstruct it from scratch.",
"Skill Iteration":"Every time you use a skill and the output is not quite right, that is signal for how to improve the skill file. Build in the habit: after any session that used a skill, ask Claude what should we update in the skill file based on what we just did. Skills that get iterated on become progressively more accurate.",
"Transcript Parsing":"Raw interview transcripts are full of noise: small talk, tangents, filler words. Transcript parsing means instructing Claude to cut through that and extract only the signal: what the user said about their problem, their current workflow, their frustrations. The output should be structured data \u2014 quotes organized by topic.",
"Quote Extraction":"Not all quotes are equal. Signal-rich verbatims reveal something specific about user behavior, mental model, or emotion. 'It is a bit annoying' is low signal. 'Every Monday morning I have to export the CSV, paste it into a Google Sheet, and manually calculate the number before the 9am standup \u2014 if I miss it, the whole team is blocked' is high signal.",
"Theme Clustering":"One user saying something is an anecdote. Three users saying a version of the same thing is a theme. Theme clustering means taking observations across all your interviews and grouping them into patterns \u2014 not by the words used, but by the underlying need or frustration they reveal.",
"Outlier Detection":"Outliers are observations that do not fit the pattern \u2014 the user who does something completely different, the quote that contradicts your hypothesis. Most synthesis processes filter these out as noise. But some outliers are the most important signal in the dataset: they reveal edge cases, power user behaviors, or assumptions that are wrong.",
"Sentiment Bucketing":"Before you can find themes, you need to sort the signal directionally. Sentiment bucketing groups feedback into positive, negative, and neutral \u2014 not as a final output but as a first pass that helps you understand the overall tone and prioritize where to look for actionable patterns.",
"Theme Extraction":"At scale, you cannot read every piece of feedback. Theme extraction means instructing Claude to find what keeps appearing across the full set \u2014 not by keyword frequency, but by underlying topic. 'Slow' and 'takes forever' and 'loading spinner' are all the same theme.",
"Priority Ranking":"Frequency alone does not tell you what to fix first. Priority ranking scores themes on both dimensions \u2014 how often it appears and how severely it affects users \u2014 and gives you a ranked list of where to focus. Weight severity signals (words like 'blocked,' 'cannot,' 'impossible') higher than mild frustration language.",
"Actionable Findings":"'Users are frustrated with onboarding' is an observation. 'Add a progress indicator to the 4-step setup flow to reduce abandonment at step 3' is an actionable finding. The difference is specificity: an actionable finding names the problem precisely enough that a designer or engineer knows what to do with it.",
"Structured Research":"Unstructured competitive research produces unstructured output \u2014 a collection of facts that is hard to act on. Structured research means defining upfront exactly what you want Claude to find for each competitor: features, pricing model, target customer, key differentiators, recent changes.",
"Competitor Matrix":"A competitor matrix is a table where rows are competitors and columns are the dimensions you care about: core value proposition, pricing, target customer, key features, notable weaknesses, recent moves. Filling in every cell surfaces gaps in your knowledge as quickly as it surfaces gaps in the market.",
"Gap Identification":"Gaps are the strategic opportunities in a competitive matrix \u2014 where no competitor is doing something well, or where every competitor is doing the same thing and leaving a segment underserved. Gap identification is the actual goal of competitive analysis: not to document what others are doing, but to find where the market has space your product could own.",
"Repeatability":"Competitive landscapes change. A competitive analysis you did six months ago is partially stale. Repeatability means building the research workflow so you can rerun it in one prompt \u2014 same structure, updated data. Run it quarterly, diff the output, update your strategy accordingly.",
"Evidence Hierarchy":"Not all research is equally credible. User interview quotes from 12 real customers carry more weight than a Reddit thread. An evidence hierarchy is an explicit ranking of your sources so that when findings conflict, you know which to trust more.",
"Brief Structure":"A decision brief has four sections in order: Situation (what is the context and what decision needs to be made), Findings (what the research showed), Options (what the realistic choices are), Recommendation (what you think should happen and why).",
"One Page Rule":"A decision brief should fit on one page. The constraint forces you to decide what actually matters. If you cannot summarise your findings and recommendation on one page, you do not have clarity yet. Two pages is a research report. One page is a brief.",
"Recommendation Framing":"A recommendation should be a specific action with clear rationale: 'We should prioritise the mobile onboarding flow because 68% of new signups come from mobile and 40% drop off before completing step 2.' Not 'we should consider improving onboarding.'",
"The Brief":"A brief is the input document you give Claude before it builds anything. It has four parts: the user, the job to be done, the flow, and the success condition. The brief is the real skill \u2014 Claude can execute almost anything if the brief is precise enough. Vague brief, vague output.",
"User + Context + Constraint":"Every good brief answers three questions explicitly: Who is the user and what context are they in? What is the job to be done? What are the constraints? These three inputs are what prevent Claude from building a technically correct but practically useless prototype.",
"0 to 1":"0 to 1 is the moment you go from a concept in your head to something you can put in front of a user. With Claude Code and a good brief, this can happen in a single 20-30 minute session. The prototype does not need to be polished \u2014 it needs to be testable.",
"Brief Iteration":"When the first prototype misses the mark, the instinct is to give more detailed fix instructions. The better instinct is to go back to the brief. Usually the prototype is wrong because the brief was incomplete or imprecise \u2014 Claude built what you described, not what you needed.",
"1 to 1.n":"1 to 1.n means you do not stop after the first prototype. You show it to users, capture what you observe, update the prototype between sessions, and test again \u2014 all in the same day. By the time you have run three or four rounds, you have multi-session evidence, not a single data point.",
"Lightweight Usability Sessions":"A formal usability study takes weeks to set up. A lightweight session takes 15 minutes and produces actionable signal the same day. Share the prototype, give the user a task to complete, observe without guiding, take structured notes.",
"Structured Feedback Capture":"The output of each usability session should be structured notes, not a narrative: what task did they attempt, where did they succeed, where did they struggle, what did they say, what surprised you. This format lets Claude synthesise patterns across all sessions.",
"Between-Session Updates":"After each session, give Claude your structured notes and ask it to identify the highest-impact change, update the prototype, and explain what changed. The updated prototype goes into the next session.",
"Diminishing Return Signal":"You have hit diminishing returns when successive test rounds produce the same observations. This is the signal to stop iterating on the prototype and decide: is this a design problem we have not solved, or a fundamental product question we need to ship to answer?",
"Learning Synthesis":"Before you stop iterating, you need a synthesis document: what did you learn with confidence, what remains uncertain, and what changed between rounds. This is the handoff artifact to engineering and design.",
"The Hypothesis Statement":"A hypothesis statement has a fixed format: 'We believe [change] will result in [outcome] because [evidence].' This format forces you to name the evidence before you ship, which makes post-ship evaluation honest.",
"From Prototype to Spec":"A prototype that has been through multiple test rounds carries more information than a spec written from scratch. When you hand it to engineering, you are handing them a working reference implementation and a rationale \u2014 not an abstract description.",
"You as Catalyst":"In vibe coding, your job is not to build the final product. It is to produce a working artifact fast enough that design and engineering can react to something real instead of interpreting an abstract description.",
"Shared Working Surface":"A shared working surface is a prototype that is live enough for the whole triad to use simultaneously. Design can annotate it. Engineering can inspect the code. You can explain the rationale. This compresses the brief-to-build cycle dramatically.",
"Design Handoff":"A Claude-generated prototype is a starting point. What design needs from it: the interaction logic, the data structure, and the user need it is addressing. Design does not need to rebuild from scratch \u2014 they refine the visual language on top of a logic layer that is already validated.",
"Eng Handoff":"Showing an engineer a working prototype changes their first question from 'how does this work?' to 'is this the right approach?' Engineers can see the intended UX, inspect the code structure, and identify where the prototype took shortcuts that will need to be done properly.",
"Guardrails":"Vibe coding has limits. Claude-generated prototypes are for learning and alignment \u2014 not for production. Never deploy a Claude prototype to real users without engineering review. Never treat a prototype architecture as a production architecture.",
"File Structure":"Most codebases follow conventions. A 'components' folder holds UI building blocks. A 'services' folder holds business logic. Understanding these conventions means you can navigate a codebase without reading a line of code.",
"Code as a Map":"You do not need to understand every line of code to understand what code does. Reading code as a map means looking for the big picture: what are the major files, what do the function names suggest, what flows into what?",
"Plain-English Tours":"A plain-English tour prompt: 'Explain what [file/module] does, what it receives as input, what it produces as output, and what would break if we changed it \u2014 in language a non-engineer can understand.'",
"Data Models":"The database schema is a record of every significant product decision that was ever made and locked into data structures. Understanding the schema helps you understand what is hard to change and what historical product decisions are baked into the current architecture.",
"Spec Readiness":"A spec is ready for engineering when an engineer can read it and start work without having to come back with clarifying questions. Spec readiness means: the acceptance criteria are testable, the edge cases are addressed, the dependencies are identified, and the scope is fixed.",
"Proposing Changes":"Structure change requests as: the current behavior, the desired behavior, the reason for the change, and any constraints on how it should be implemented. This gives engineering everything they need without a meeting.",
"Unblocking vs. Deciding":"The distinction: unblocking means an engineer genuinely cannot proceed without a product decision. Deciding means the engineer has a technical solution but wants sign-off. The former requires you. The latter often does not.",
"Async Communication":"Engineers do their best work in long uninterrupted blocks. Every interruption costs more than its face value. Front-load your context, batch your questions, set expectations about response time.",
"Design Review Structure":"Structured design review has an agenda: what specific user need does this design address, what does the evidence say, what are the specific changes needed before it moves forward.",
"Needs vs. Solutions":"The most common mistake in design review is critiquing the solution instead of the need. 'I don't think this button should be blue' is a solution critique. 'Users in our testing sessions couldn't find the primary action on this screen' is a need.",
"Research-Grounded Feedback":"Feedback grounded in research evidence is almost impossible to dismiss. 'In three usability sessions, users ignored this element entirely' is harder to argue with than 'I think this element is not prominent enough.'",
"Approval vs. Sign-off":"You approve direction: does this design address the user need, does it fit the product strategy? Design owns execution: is the visual hierarchy correct, do the interactions feel right? Be explicit about what you are approving.",
"QA":"QA is not the same as engineering QA. Engineers test that the code does what the spec said. You test that the spec said the right thing \u2014 that the shipped feature actually addresses the user need.",
"Edge Case Thinking":"Edge cases are the gaps between the happy path and reality: what happens when the user uploads an empty file, when the API is slow, when two users edit the same record simultaneously? Most specs cover the happy path well and edge cases poorly.",
"Launch Readiness":"Launch readiness is a pre-launch checklist: is the feature flagged correctly, are the error states handled, is analytics instrumented, is the support team briefed, is the rollback plan documented?",
"Participating in Code Review":"You review PRs for scope and user impact: does this PR match what was specced, does anything in the diff suggest a behavior that would surprise a user, is the feature behind a flag so it can be rolled back quickly?",
"Natural Language to SQL":"You do not need to know SQL to get answers from your data warehouse. Describe the question in plain English and let Claude write the query. Your job is to ask precise questions; Claude's job is to translate them.",
"Result Interpretation":"Getting a query result is not the same as getting an answer. A table of numbers needs interpretation: what does this tell us, what does not it tell us, what might explain this pattern?",
"Iterative Analysis":"Good data analysis is a conversation, not a single query. You start broad and drill into anomalies. Each answer generates the next question.",
"Data Quality":"Not every number from a query is reliable. Data quality issues are common: tracking was not instrumented for the full period, there was a deployment that affected counts, the definition of an event changed. Develop intuition for when a number looks wrong.",
"Metric Trees":"A metric tree decomposes a top-line metric into its component parts. When a top-line metric moves, the tree is how you find which branch moved.",
"Decomposition":"Decomposition means systematically checking each branch of the metric tree to find the one that explains the movement. This specificity is what makes hypothesis generation tractable.",
"Hypothesis Generation":"Once you know where in the metric tree the movement is concentrated, you generate hypotheses before diving into more data. Generating them before querying prevents confirmation bias.",
"Evidence Matching":"Evidence matching means taking your ranked list of hypotheses and, for each one, identifying what data would confirm or deny it \u2014 then going to find that data.",
"Evidence Chain":"An evidence chain is the explicit reasoning path from your data to your recommendation: here is what the data shows, here is what that means, here is what we should do. The chain should have no gaps.",
"Confidence Levels":"Different findings have different confidence levels. Making confidence levels explicit prevents stakeholders from treating weak evidence as certainty \u2014 and builds trust.",
"Preempting Objections":"Every recommendation has a predictable counterargument. Preempting objections means addressing the most likely counterarguments in the brief itself. Handled preemptively, objections become footnotes.",
"Decision Trigger":"A recommendation without a clear ask is not a recommendation \u2014 it is a presentation. The decision trigger is the specific question you need answered. State it at the top and bottom of your brief.",
"Experiment Design":"A valid experiment changes exactly one thing, measures exactly one primary outcome, and assigns users randomly to treatment and control groups. Decide the treatment, the metric, and the success threshold before running the test.",
"Sample Size":"Calculate how many users you need in each arm to detect an effect of the size you care about at a given confidence level \u2014 before you start. The most common mistake is running a test for an arbitrary number of days.",
"Statistical Significance":"Statistical significance at p < 0.05 means there is a less than 5% probability that the difference occurred by random chance. It does not mean the effect is large, important, or guaranteed to persist.",
"Decision Framework":"Before you run an experiment, decide the decision rules: if significant and positive, ship. If not significant, extend, iterate, or kill. Making these decisions before seeing results prevents tests that never end.",
"PRD Structure":"An actionable PRD has: a problem statement, user story with context, testable acceptance criteria, out-of-scope explicitly called out, open questions flagged, and a success metric.",
"Skill Iteration":"After every PRD you produce with Claude, ask: what did I have to fix manually? What did Claude miss? These are inputs for improving the skill file. Over three or four uses, a PRD skill converges on your exact style.",
"Style Calibration":"Style calibration means encoding your writing preferences in the skill file: sentence length, whether you use headers or prose, how you handle edge cases, your preferred vocabulary.",
"Reuse":"A static PRD template is a starting point you edit each time. A PRD skill is an instruction set that produces the right structure for any feature, because it understands the pattern \u2014 not just the format.",
"Stakeholder Perspectives":"Instructing Claude to think from a specific stakeholder's perspective \u2014 'review this as a skeptical VP of Engineering focused on technical debt and delivery risk' \u2014 produces role-specific challenges that mirror what that stakeholder will actually raise.",
"Objection Surfacing":"Every document has questions it does not answer, assumptions it does not defend, trade-offs it does not acknowledge. Objection surfacing means asking Claude to find them before you share the doc.",
"Pre-Mortem Thinking":"A pre-mortem: imagine it is six months later and the project failed. Work backwards to identify why. Applied to documents, it surfaces risks and weaknesses you might have optimised around while writing.",
"Revision Before Review":"The outcome of pressure-testing is a revised document, not a list of notes to address verbally. Show up to the meeting having already answered the predictable questions.",
"Source Ingestion":"Your week does not live in one place. Collect the raw material from Jira tickets, Slack threads, meeting notes and feed it to Claude \u2014 dump the raw notes and let Claude extract the signal.",
"Update Structure":"A weekly update should be scannable in 30 seconds. The format: Shipped, In Progress, Blockers, Next Week. This four-part structure is enough for a VP to understand the state of a feature in a glance.",
"Audience Calibration":"The same raw material produces different updates for different audiences. Your VP needs: are we on track, are there risks, what decisions are needed? Your team needs: what did we ship, what is blocking them?",
"Time Saved":"A good status update skill compounds over time. Once Claude knows your format, audience, and style, the only variable each week is the raw input. Dump your notes, run the skill, spend 60 seconds reviewing the output.",
"Narrative Structure":"A presentation that makes an argument has a spine: each slide creates a question that the next slide answers. The audience should feel pulled forward, not dropped into a new topic with each slide.",
"Data to Slide":"Every data point has a visual form that makes its meaning most legible. Choose the visual that makes the point fastest, not whatever chart type the data happens to fit.",
"Speaker Notes":"Speaker notes carry everything the audience needs to hear but should not have to read: the context behind a number, the rationale for a decision. Slides with too much text make the audience read instead of listen.",
"The So What Test":"For every slide, ask 'so what?' If the answer is not obvious from the slide itself, either the slide is missing something or it should not be in the deck.",
"Workspace Structure":"A consistent folder structure is what lets Claude navigate your workspace reliably. One folder per product or project, each with a CLAUDE.md, project.md, strategy.md, change_log.md, and a skills/ subfolder.",
"Skill Registry":"As you build more skills, a registry becomes important: a single document that lists every skill you have, what it does, and when to trigger it. Without a registry, you forget skills exist and rebuild them from scratch.",
"First Session Check":"Before you trust your setup in production work, run a verification session: ask Claude to explain what it knows about your project and which skills it has loaded. A broken CLAUDE.md silently produces sessions with wrong context.",
"Naming Discipline":"File names are how Claude finds things when you ask for them. Ambiguous names ('notes.md,' 'draft2.md') produce unreliable retrieval. Consistent, descriptive names produce reliable ones.",
"Workflow Design":"A workflow is a recurring task decomposed into a sequence of steps that Claude can follow every time. Identify which steps require judgment and which follow a pattern, then write the workflow as an ordered instruction set.",
"Skill Chaining":"Complex workflows often combine multiple skills: the output of the research skill becomes the input of the analysis skill, whose output becomes the input of the recommendation brief skill.",
"Trigger Prompts":"A trigger prompt is the one-line input that initiates a full workflow. It supplies the variable inputs while the workflow handles everything else.",
"Time Audit":"Workflows are worth building when they save meaningful time on tasks you do frequently. Note how long a task takes before and after. This tells you the payback period.",
"Agent vs. Workflow":"A workflow runs when you trigger it \u2014 you are the initiator. An agent runs on a schedule \u2014 it initiates itself and surfaces results to you. Instead of asking Claude to do things, you are setting up Claude to notice things and tell you about them.",
"High-Frequency Low-Judgment Tasks":"The best candidates for agents are tasks that happen frequently, follow a predictable pattern, require low judgment to execute, and produce output you review rather than execute directly.",
"Human in the Loop":"Every agent needs a clearly defined human checkpoint: the moment where the agent stops, shows you what it produced, and waits for your approval before doing anything further.",
"End-to-End Sessions":"An end-to-end session is the benchmark for whether your Claude Code setup is actually working: you start with a real product problem and complete the full workflow without stopping to reconfigure anything or re-explain context.",
"Gap Finding":"Gap finding is an active habit: during every session, when you notice yourself doing something repetitive, slow, or frustrating, you capture it on the improvement list.",
"Iteration Cadence":"A weekly iteration cadence means spending 15-20 minutes at the end of the week making one concrete change to your setup. A setup that gets 1% better each week is dramatically better after a year.",
"The Improvement List":"The improvement list is a simple text file where you capture everything you want to improve about your Claude Code setup, in the moment you notice the gap.",
"Skill Sharing":"Sharing skills with teammates means packaging them in a way that works without the context that lives in your head. A well-packaged skill is one a teammate can use successfully the first time without asking you to explain it.",
"Onboarding Guide":"An onboarding guide for Claude Code should cover four things: how to install and configure, how to run the first session using one existing skill, how to find the skill library, and how to contribute improvements back. It should be one page.",
"Live Demo":"The most effective adoption technique is a 15-minute live demo on a real problem the person is currently stuck on \u2014 not a toy example, their actual work.",
"Shared Library":"A shared skill library is a folder in a shared repository where the team stores and iterates on skills together. Over time the library becomes a compounding asset \u2014 each team member's experience improving the skills benefits everyone.",
"Scheduled Queries":"A scheduled query executes automatically at a defined time rather than when you remember to run it. Paired with Claude Code, it becomes the foundation of a metric pulse agent.",
"Baseline Comparison":"A metric in isolation tells you a number. A metric compared to baseline tells you whether that number is normal or not. Compare today's value to 7-day and 30-day rolling averages and report the delta.",
"Anomaly Threshold":"An anomaly threshold is a rule that determines when a metric movement is large enough to alert on. Start conservative (15-20% deviation) and tune based on which alerts were worth acting on.",
"Signal vs. Noise":"The test of a well-tuned agent is what happens when it is silent. A week of no alerts should mean nothing outside normal range. Tune iteratively: for every alert, ask whether it was worth acting on.",
"Multi-Source Aggregation":"A weekly insight report combines multiple data sources: what moved in the data, what shipped in engineering, what users are saying in feedback, what changed competitively \u2014 all in a single agent run.",
"Narrative Synthesis":"Raw data from multiple sources is not an insight report. Narrative synthesis is the step where Claude turns the data into a story: what moved, why it likely moved, what to watch next week.",
"Versioned Artifacts":"Each weekly report gets saved as a dated file. Over time this creates a searchable archive of your product's history.",
"Delivery Routing":"The same underlying report does not work for all audiences. Delivery routing means the agent produces all versions from the same source data and routes each to the right destination.",
"Event-Triggered Agents":"An event-triggered agent runs when something happens: a metric crosses a threshold, a new batch of feedback arrives, a deploy completes. This is more powerful for anomaly detection because it responds to the moment the anomaly occurs.",
"Auto-Diagnosis":"When an anomaly triggers, the agent does not just alert \u2014 it runs the diagnostic automatically: decomposing the metric, checking which component moved, querying data sources that would confirm or deny each hypothesis.",
"Hypothesis Ranking":"Hypothesis ranking orders hypotheses by likelihood: what does the data pattern most strongly suggest? A drop that started at exactly the same time as a deploy is ranked higher for 'deploy caused the drop' than 'seasonal variation.'",
"Human Escalation Path":"Even a sophisticated auto-diagnosis agent should not decide whether to escalate or roll back \u2014 that is your call. The agent completes its diagnosis, classifies severity, delivers the output, and waits.",
"Agent Registry":"A single document that lists every agent you have running, what condition or schedule triggers it, what data sources it accesses, where it delivers output, and what it does when it cannot reach a data source.",
"Shared Context":"Shared context means all agents read from the same project.md and strategy.md at the start of every run \u2014 so their analysis is grounded in your current frame, not a static snapshot from when the agent was built.",
"Output Consistency":"Every agent writes to a predictable path, uses a consistent format, and produces metadata that other agents and you can rely on. Inconsistent output formats mean you spend time reformatting instead of analysing.",
"Failure Handling":"An agent that silently fails is worse than no agent at all. Every agent needs explicit failure handling: if it cannot reach a data source, it produces an error report to the same delivery destination as its normal output."
};

function totalLessons(){return curriculum.reduce((a,p)=>a+p.lessons.length,0)+1}
function updateProgress(){
  const t=totalLessons(),d=done.length;
  document.getElementById('progress-pct').textContent=d+' / '+t;
  document.getElementById('progress-fill').style.width=Math.round(d/t*100)+'%';
}
function diffBadge(d){
  if(d==='easy')return '<span class="badge badge-easy">Easy</span>';
  if(d==='medium')return '<span class="badge badge-medium">Medium</span>';
  return '<span class="badge badge-advanced">Advanced</span>';
}
let activePid=null,activeLid=null;
let activeDiff='all';
function setDiff(btn,diff){
  activeDiff=diff;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.part-group').forEach(g=>{
    if(g.id==='co-group')return;
    let anyVisible=false;
    g.querySelectorAll('.lesson-item').forEach(item=>{
      const show=(diff==='all'||item.dataset.difficulty===diff);
      item.style.display=show?'flex':'none';
      if(show)anyVisible=true;
    });
    g.style.display=anyVisible?'':'none';
    if(anyVisible&&diff!=='all')g.classList.add('open');
    if(diff==='all')g.style.display='';
  });
}
function renderNav(){
  const nav=document.getElementById('parts-nav');
  nav.innerHTML='';

  // Course Overview — outer collapsible containing L1-L9 as nested part-groups
  const co=document.createElement('div');
  co.className='part-group';
  co.id='co-group';

  const coHeader=document.createElement('div');
  coHeader.className='part-header co-header';
  coHeader.style.cursor='pointer';

  const coChevron=document.createElement('span');
  coChevron.className='part-chevron';
  coChevron.innerHTML='&#9658;';
  coChevron.style.transform='rotate(90deg)';
  coChevron.addEventListener('click',(e)=>{
    e.stopPropagation();
    coOpen=!coOpen;
    coList.style.display=coOpen?'block':'none';
    coChevron.style.transform=coOpen?'rotate(90deg)':'';
  });

  const coLabel=document.createElement('span');
  coLabel.className='part-name';
  coLabel.textContent='Course overview';
  coLabel.addEventListener('click',()=>showHome());

  const coPill=document.createElement('span');
  coPill.className='part-pill co-pill';
  coPill.innerHTML='&#8962;';
  coPill.addEventListener('click',()=>showHome());

  let coOpen=true;
  coHeader.appendChild(coPill);
  coHeader.appendChild(coLabel);
  coHeader.appendChild(coChevron);
  co.appendChild(coHeader);

  const coList=document.createElement('div');
  coList.className='co-list';
  coList.style.cssText='padding:0;display:none;';

  // L1 — Before you start (collapsible with 1.1 What you need)
  const l1group=document.createElement('div');
  l1group.className='part-group';
  l1group.id='l0-group';
  l1group.style.borderBottom='none';
  l1group.innerHTML=
    '<div class="part-header l0-header" style="padding-left:24px;cursor:pointer;"><span class="part-pill l0-pill">L1</span><span class="part-name">Before you start</span><span class="part-chevron">&#9658;</span></div>'+
    '<div class="lessons-list"><div class="lesson-item l0-item" data-sid="p0s1" style="padding-left:56px;"><span class="lesson-dot"></span><span style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;min-width:24px">1</span>What you need</div></div>';
  l1group.querySelector('.l0-header').addEventListener('click',()=>l1group.classList.toggle('open'));
  l1group.querySelector('.l0-item').addEventListener('click',()=>showL0Section('p0s1'));
  coList.appendChild(l1group);

  // L2-L9 — each a collapsible part-group with its lessons
  curriculum.forEach(p=>{
    const g=document.createElement('div');
    g.className='part-group';
    g.style.borderBottom='none';
    const isDone=done.filter(id=>p.lessons.some(l=>l.id===id)).length;
    const items=p.lessons.map(l=>{
      const lessonDone=done.includes(l.id);
      return '<div class="lesson-item'+(lessonDone?' done':'')+'" data-lid="'+l.id+'" data-pid="'+p.id+'" data-difficulty="'+l.difficulty+'" style="padding-left:56px;"><span class="lesson-dot"></span><span style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;min-width:24px">'+l.num+'</span>'+l.title+'</div>';
    }).join('');
    g.innerHTML='<div class="part-header" style="padding-left:24px;"><span class="part-pill">'+p.num+'</span><span class="part-name">'+p.title+'</span><span class="part-chevron">&#9658;</span></div><div class="lessons-list">'+items+'</div>';
    g.querySelector('.part-header').addEventListener('click',()=>g.classList.toggle('open'));
    g.querySelectorAll('.lesson-item').forEach(item=>{
      item.addEventListener('click',()=>openLesson(item.dataset.pid,item.dataset.lid));
    });
    coList.appendChild(g);
  });

  // L10 — Reference prompt library (collapsible with sub-page)
  const l10group=document.createElement('div');
  l10group.className='part-group';
  l10group.id='l10-group';
  l10group.style.borderBottom='none';
  l10group.innerHTML=
    '<div class="part-header l10-header" style="padding-left:24px;cursor:pointer;"><span class="part-pill">L10</span><span class="part-name">Reference prompt library</span><span class="part-chevron">&#9658;</span></div>'+
    '<div class="lessons-list"><div class="lesson-item" id="pl-sub-item" style="padding-left:56px;cursor:pointer;"><span class="lesson-dot"></span><span style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;min-width:24px">10</span>Prompts by task</div></div>';
  l10group.querySelector('.l10-header').addEventListener('click',()=>l10group.classList.toggle('open'));
  l10group.querySelector('#pl-sub-item').addEventListener('click',()=>showPromptLibrary());
  coList.appendChild(l10group);

  co.appendChild(coList);
  nav.appendChild(co);
}


function clearL0Active(){
  const cog=document.getElementById('co-group');
  if(cog)cog.classList.remove('co-active');
  document.querySelectorAll('.part-item').forEach(el=>{
    el.classList.remove('active');
    el.style.background='';
    el.style.color='var(--muted)';
    el.style.borderLeftColor='transparent';
  });
  document.querySelectorAll('.l0-item').forEach(el=>{
    el.classList.remove('active');
    el.style.color='';
    el.style.background='';
    el.style.borderLeftColor='';
  });
}
function setActivePartItem(pid){
  clearL0Active();
  const cog=document.getElementById('co-group');
  if(cog)cog.classList.add('co-active');
  const target=pid==='p0s1'
    ? document.getElementById('co-l1-item')
    : document.querySelector('.part-item[data-pid="'+pid+'"]');
  if(target){
    target.classList.add('active');
    target.style.background='var(--accent-light)';
    target.style.color='var(--accent)';
    target.style.borderLeftColor='var(--accent)';
  }
}
function showHome(){
  activePid=null;activeLid=null;
  clearL0Active();
  document.querySelectorAll('.part-item').forEach(el=>{el.classList.remove('active');el.style.background='';el.style.color='var(--muted)';el.style.borderLeftColor='transparent';});

function openFirst(pid){
  const p=curriculum.find(x=>x.id===pid);
  if(p)openLesson(pid,p.lessons[0].id);
}
function openLesson(pid,lid){
  const p=curriculum.find(x=>x.id===pid);
  const lesson=p&&p.lessons.find(l=>l.id===lid);
  if(!p||!lesson)return;
  activePid=pid;activeLid=lid;
  document.querySelectorAll('.lesson-item').forEach(el=>el.classList.remove('active'));
  const el=document.querySelector('.lesson-item[data-lid="'+lid+'"]');
  if(el){el.classList.add('active');el.closest('.part-group').classList.add('open')}
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.remove('active'));
  const nlHomeEl=document.getElementById('nl-home');
  if(nlHomeEl)nlHomeEl.classList.remove('active');
  setActivePartItem(pid);
  document.getElementById('breadcrumb').innerHTML='<span onclick="showHome()" style="cursor:pointer">Course overview</span><span style="color:var(--muted2)"> &rsaquo; </span><span>'+p.num+': '+p.title+'</span><span style="color:var(--muted2)"> &rsaquo; </span><span class="breadcrumb-current">'+lesson.num+'</span>';
  const isDone=done.includes(lid);
  document.getElementById('topbar-right').innerHTML=isDone?'<span style="font-size:11px;color:var(--teal);font-family:IBM Plex Mono,monospace;font-weight:600">\u2713 Complete</span>':'';
  const ex=lessonExamples[lid];
  const li=p.lessons.findIndex(l=>l.id===lid);
  const prev=li>0?p.lessons[li-1]:null;
  const next=li<p.lessons.length-1?p.lessons[li+1]:null;
  const conceptsHtml=lesson.concepts.map((c,i)=>{
    const expl=explanations[c.name]||'';
    return '<div class="concept-card" id="cc-'+lid+'-'+i+'">'+
      '<div class="concept-head" onclick="toggleC(\''+lid+'\','+i+')">'+
      '<div class="concept-toggle">'+(expl?'+':'&middot;')+'</div>'+
      '<div class="concept-text"><div class="concept-name">'+c.name+'</div><div class="concept-short">'+c.desc+'</div></div>'+
      '</div>'+
      (expl?'<div class="concept-body"><div class="concept-explanation"><p>'+expl+'</p></div></div>':'')+
      '</div>';
  }).join('');
  const baHtml=ex?'<div class="section-label">Before and after</div><div class="ba-box"><div class="ba-cols"><div class="ba-side before"><div class="ba-label">Before</div><div class="ba-content">'+ex.before.replace(/\\n/g,'\n')+'</div></div><div class="ba-side after"><div class="ba-label">After</div><div class="ba-content">'+ex.after.replace(/\\n/g,'\n')+'</div></div></div></div>':'';
  const promptsHtml=(lesson.prompts||[]).map(function(p){
    var isAgent=p.startsWith && p.startsWith('\u00a7AGENT\u00a7');
    var display=isAgent?p.slice(7):p;
    var cls=isAgent?'prompt-block agent':'prompt-block';
    var badge=isAgent?'<div class="agent-badge">&#9889; AGENT PROMPT</div><br>':'';
    return '<div class="'+cls+'">'+badge+display+'<button class="copy-btn" onclick="copyTxt(this,decodeURIComponent(\''+encodeURIComponent(display)+'\'))">COPY</button></div>';
  }).join('');
  const qid='quiz-'+lid;
  document.getElementById('main-view').innerHTML=
    '<div class="content">'+
    '<div class="lesson-meta"><span class="lesson-tag">'+p.num+': '+p.title+'</span><span class="lesson-num-tag">Lesson '+lesson.num+'</span><span class="badge badge-time">\u23f1 '+lesson.time+'</span>'+diffBadge(lesson.difficulty)+(isDone?'<span style="font-size:10px;color:var(--teal);font-family:IBM Plex Mono,monospace;font-weight:600">\u2713 Complete</span>':'')+'</div>'+
    '<h1 class="lesson-title">'+lesson.title+'</h1>'+
    '<p class="lesson-subtitle">'+lesson.subtitle+'</p>'+
    '<div class="section-label">Key concepts</div>'+
    '<div class="concepts-list">'+conceptsHtml+'</div>'+
    baHtml+
    '<div class="section-label">Exercise</div>'+
    '<div class="exercise-box"><div class="exercise-label">Your mission</div><p class="exercise-text">'+lesson.exercise+'</p></div>'+
    '<div class="section-label">Starter prompts</div>'+promptsHtml+
    '<div class="section-label">Artifact you will produce</div>'+
    '<div class="artifact-box"><div class="artifact-icon">&#128196;</div><div><div class="artifact-label">Take-away</div><div class="artifact-name">'+lesson.artifact+'</div></div></div>'+
    '<div class="section-label" style="margin-top:24px">Check your understanding</div>'+
    '<div class="quiz-section" id="'+qid+'">'+
    '<div class="quiz-q">'+lesson.quiz.q+'</div>'+
    '<div class="quiz-options">'+lesson.quiz.opts.map((o,i)=>'<div class="quiz-opt" onclick="answerQ(\''+lid+'\','+i+','+lesson.quiz.correct+',`'+lesson.quiz.explain.replace(/`/g,'\\`')+'`)">'+o+'</div>').join('')+'</div>'+
    '<div class="quiz-feedback" id="qf-'+lid+'"></div></div>'+
    '</div>'+
    '<div class="complete-bar">'+
    '<span class="complete-hint">'+(isDone?'\u2713 Lesson complete \u2014 nice work.':'Finish the exercise, then mark this lesson done.')+'</span>'+
    '<button class="btn btn-primary" onclick="markDone(\''+lid+'\',this)" '+(isDone?'disabled style="background:var(--teal);border-color:var(--teal);cursor:default;"':'')+'>'+
    (isDone?'\u2713 Complete':'Mark complete \u2192')+'</button>'+
    '<div style="display:flex;gap:8px;margin-left:auto">'+
    (prev?'<button class="btn btn-ghost" onclick="openLesson(\''+pid+'\',\''+prev.id+'\')">\u2190 Prev</button>':'')+
    (next?'<button class="btn btn-ghost" onclick="openLesson(\''+pid+'\',\''+next.id+'\')">Next \u2192</button>':'')+
    '</div></div>';
  window.scrollTo(0,0);
}
function toggleC(lid,idx){
  const card=document.getElementById('cc-'+lid+'-'+idx);
  if(!card)return;
  const isOpen=card.classList.contains('open');
  card.classList.toggle('open',!isOpen);
  const btn=card.querySelector('.concept-toggle');
  if(btn&&btn.textContent!=='\u00b7')btn.innerHTML=isOpen?'+':'&minus;';
}
function answerQ(id,chosen,correct,explain){
  const c=document.getElementById('quiz-'+id);
  const opts=c.querySelectorAll('.quiz-opt');
  const fb=document.getElementById('qf-'+id);
  opts.forEach((o,i)=>{o.style.pointerEvents='none';if(i===correct)o.classList.add('correct');else if(i===chosen&&chosen!==correct)o.classList.add('wrong')});
  fb.textContent=(chosen===correct?'\u2713 Correct. ':'\u2717 Not quite. ')+explain;
  fb.className='quiz-feedback '+(chosen===correct?'ok':'err');
}
function markDone(lid,btn){
  if(!done.includes(lid))done.push(lid);
  saveDone();updateProgress();
  if(btn){btn.textContent='\u2713 Complete';btn.disabled=true;btn.style.background='var(--teal)';btn.style.borderColor='var(--teal)'}
  const item=document.querySelector('.lesson-item[data-lid="'+lid+'"]');
  if(item){item.classList.add('done');const dot=item.querySelector('.lesson-dot');if(dot)dot.style.background='var(--teal)'}
}
function copyTxt(btn,text){navigator.clipboard.writeText(text).then(()=>{btn.textContent='COPIED';setTimeout(()=>btn.textContent='COPY',1500)})}

      '<div style="font-size:13px;color:#7A5000;line-height:1.6;margin-bottom:10px">Claude Code sends your prompts and pasted content to Anthropic\u2019s servers. Before using it for real work, know what your company\u2019s AI usage policy says.</div>'+

      '<div style="font-size:13px;color:var(--red);margin-bottom:3px">\u2715 Unreleased product details under NDA</div>'+
      '<div style="font-size:13px;color:var(--red);margin-bottom:3px">\u2715 Internal financial data not cleared for AI tools</div>'+
      '<div style="font-size:13px;color:var(--red);margin-bottom:10px">\u2715 Credentials, API keys, passwords of any kind</div>'+
      '<div style="font-size:13px;color:var(--teal);margin-bottom:3px">\u2713 Anonymized research transcripts</div>'+
      '<div style="font-size:13px;color:var(--teal);margin-bottom:3px">\u2713 Your own notes and meeting summaries</div>'+
      '<div style="font-size:13px;color:var(--teal);margin-bottom:3px">\u2713 Public competitor information</div>'+
      '<div style="font-size:13px;color:var(--teal)">\u2713 Code from public repositories</div>'+
      '</div>'+
      '<div style="margin-bottom:8px;font-family:\'IBM Plex Mono\',monospace;font-size:9px;font-weight:600;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:10px">A note on AI judgment<span style="flex:1;height:1px;background:var(--border)"></span></div>'+

function showGettingStarted(){ showL0Section('p0s1'); }
function showL0Section(sid){
  const sec=l0content[sid];
  if(!sec)return;
  setActivePartItem('p0s1');
  document.querySelectorAll('.l0-item').forEach(el=>{
    const active=el.dataset.sid===sid;
    el.style.color=active?'var(--accent)':'';
    el.style.borderLeftColor=active?'var(--accent)':'';
    el.style.background=active?'var(--accent-light)':'';
  });
  document.querySelectorAll('.lesson-item:not(.l0-item)').forEach(el=>el.classList.remove('active'));
  setActive('');
  document.getElementById('breadcrumb').innerHTML='<span onclick="showHome()" style="cursor:pointer">Course overview</span><span style="color:var(--muted2)"> &rsaquo; </span><span>L1: Before you start</span><span style="color:var(--muted2)"> &rsaquo; </span><span class="breadcrumb-current">1</span>';
  document.getElementById('topbar-right').innerHTML='';
  document.getElementById('main-view').innerHTML=
    '<div class="content" style="max-width:760px">'+
    '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:9px;color:var(--accent);font-weight:600;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px">L1</div>'+
    '<h1 class="lesson-title" style="font-size:28px;margin-bottom:8px">'+sec.title+'</h1>'+
    '<p class="lesson-subtitle">'+sec.subtitle+'</p>'+
    '<div style="margin-top:20px">'+sec.html()+'</div>'+
    '</div>';
  window.scrollTo(0,0);
}

// ── PROMPT LIBRARY ────────────────────────────────────────────────────
function showPromptLibrary(){
  setActive('');
  document.getElementById('breadcrumb').innerHTML='<span onclick="showHome()" style="cursor:pointer">Course overview</span><span style="color:var(--muted2)"> &rsaquo; </span><span>L10: Reference prompt library</span><span style="color:var(--muted2)"> &rsaquo; </span><span class="breadcrumb-current">10</span>';
  document.getElementById('topbar-right').innerHTML='';
  document.querySelectorAll('.lesson-item').forEach(el=>el.classList.remove('active'));
  const plItem=document.getElementById('pl-sub-item');
  if(plItem)plItem.classList.add('active');
  const l10g=document.getElementById('l10-group');
  if(l10g)l10g.classList.add('open');
  const total=promptLibrary.reduce((s,g)=>s+g.items.length,0);
  document.getElementById('main-view').innerHTML=`
    <div class="content" style="max-width:820px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent);font-weight:600;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:10px">L10</div><h1 class="lesson-title" style="font-size:28px;margin-bottom:8px">Prompts by task</h1>
      <p class="lesson-subtitle">${total} prompts organized by task. Copy any prompt directly into Claude Code.</p>
      <input type="text" placeholder="Search prompts..." oninput="plSearch(this.value)" style="width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:DM Sans,sans-serif;color:var(--text);background:var(--surface);outline:none;margin-bottom:16px;transition:border-color 0.15s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'">
      <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:20px" id="pl-filters">
        <div class="pl-filter active" onclick="plCat(this,'All')">All</div>
        ${promptLibrary.map(g=>'<div class="pl-filter" onclick="plCat(this,\''+g.cat+'\')">'+g.cat+'</div>').join('')}
      </div>
      <div id="pl-content">
        ${promptLibrary.map(g=>`
          <div class="pl-group" data-cat="${g.cat}" style="margin-bottom:24px">
            <div style="font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:600;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px">${g.cat}<span style="flex:1;height:1px;background:var(--border);display:inline-block"></span></div>
            ${g.items.map(item=>{
              const isAgent=item.prompt.startsWith('\u00a7AGENT\u00a7');
              const display=isAgent?item.prompt.slice(7):item.prompt;
              return '<div class="pl-card" data-agent="'+(isAgent?1:0)+'" data-title="'+item.title.toLowerCase()+'" data-text="'+item.prompt.toLowerCase()+'" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;transition:border-color 0.12s'+(isAgent?';border-left:3px solid #1D9E75;background:#F9FFFE':'')+'">'
                +'<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">'
                +'<div style="display:flex;align-items:center;gap:8px">'
                +(isAgent?'<span style="display:inline-flex;align-items:center;gap:4px;background:#1D9E75;border-radius:4px;padding:2px 8px;font-size:8px;font-weight:700;color:#fff;letter-spacing:0.1em">&#9889; AGENT</span>':'')
                +'<span style="font-size:13px;font-weight:500;color:var(--text)">'+item.title+'</span></div>'
                +'<button onclick="plCopy(this,decodeURIComponent(\''+encodeURIComponent(display)+'\'))" style="background:var(--accent-light);border:1px solid var(--accent-mid);color:var(--accent);font-family:IBM Plex Mono,monospace;font-size:9px;font-weight:600;padding:4px 9px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:all 0.12s" onmouseover="this.style.background=\'var(--accent)\';this.style.color=\'#fff\'" onmouseout="this.style.background=\'var(--accent-light)\';this.style.color=\'var(--accent)\'">COPY</button></div>'
                +'<div style="font-family:IBM Plex Mono,monospace;font-size:11px;color:var(--muted);line-height:1.7;white-space:pre-wrap;word-break:break-word">'+display+'</div>'
                +'</div>';
            }).join('')}
          </div>`).join('')}
      </div>
    </div>`;
  window.scrollTo(0,0);
}
function plCat(el,cat){
  document.querySelectorAll('.pl-filter').forEach(f=>f.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.pl-group').forEach(g=>{g.style.display=(cat==='All'||g.dataset.cat===cat)?'block':'none'});
}
function plSearch(q){
  const lq=q.toLowerCase();
  document.querySelectorAll('.pl-card').forEach(c=>{
    c.style.display=(c.dataset.title.includes(lq)||c.dataset.text.includes(lq))?'block':'none';
  });
  document.querySelectorAll('.pl-group').forEach(g=>{
    const vis=[...g.querySelectorAll('.pl-card')].some(c=>c.style.display!=='none');
    g.style.display=vis?'block':'none';
  });
}
function plCopy(btn,text){
  navigator.clipboard.writeText(text).then(()=>{btn.textContent='COPIED';setTimeout(()=>btn.textContent='COPY',1500)});
}

  setActive('nl-release');
  document.getElementById('breadcrumb').innerHTML='<span onclick="showHome()" style="cursor:pointer">Course overview</span><span style="color:var(--muted2)"> &rsaquo; </span><span class="breadcrumb-current">What\'s new</span>';
  document.getElementById('topbar-right').innerHTML='';
  document.querySelectorAll('.lesson-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('main-view').innerHTML=`
    <div class="content" style="max-width:760px">
            <h1 class="lesson-title" style="font-size:28px;margin-bottom:8px">Releases</h1>
      <p class="lesson-subtitle">Course updates, new lessons, and improvements.</p>

      <div class="section-label">May 2026 \u2014 v1.0 initial</div>
      ${rn('\u{1F680}','Launched','Claude Code for Everyone course for public usage.','var(--accent)','#fff')}
    </div>`;
  window.scrollTo(0,0);
}
function rn(num,title,body,bg,fg){
  var nbg=bg||'var(--surface2)',nfg=fg||'var(--muted)';
  var isEmoji=/\p{Emoji}/u.test(num);
  var circleStyle=isEmoji
    ?'width:28px;height:28px;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;'
    :'width:28px;height:28px;border-radius:50%;background:'+nbg+';color:'+nfg+';font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:IBM Plex Mono,monospace';
  return '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start">'+
    '<div style="'+circleStyle+'">'+num+'</div>'+
    '<div><div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px">'+title+'</div><div style="font-size:12px;color:var(--muted);line-height:1.6">'+body+'</div></div>'+
    '</div>';
}

if(_cog){const _cl=_cog.querySelector('.co-list');if(_cl)_cl.style.display='block';_cog.querySelector('.part-chevron').style.transform='rotate(90deg)';}

</script>
