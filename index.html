<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code for Everyone — Make your learning better</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F2EE;--surface:#FFFFFF;--surface2:#EEECE8;--border:#DDD9D2;
  --text:#1C1A17;--muted:#7A7670;--muted2:#A8A49E;
  --accent:#2A5C8F;--accent-light:#E8F0F8;--accent-mid:#B8CDE0;
  --teal:#0F6B52;--teal-light:#E4F3EE;
  --amber:#A06010;--amber-light:#FDF3E3;
  --green:#1a6b3a;--green-light:#E6F5EE;
  --red:#9B2C2C;--red-light:#FEF0F0;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:258px;min-width:258px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:10}
.sidebar::before{content:'';display:block;height:3px;background:linear-gradient(90deg,var(--accent),#5B9AFF);flex-shrink:0}
.sidebar-brand{padding:18px 16px 14px;border-bottom:1px solid var(--border)}
.brand-title{font-family:'Fraunces',serif;font-size:15px;font-weight:500;color:var(--text);line-height:1.2}
.brand-sub{margin-top:4px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase}
.progress-wrap{padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface2)}
.progress-label{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:5px;font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.04em}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#5B9AFF);border-radius:2px;transition:width 0.4s ease}
.parts-nav{flex:1;padding:4px 0 8px;overflow-y:auto}
.part-group{border-bottom:1px solid var(--border)}
.part-header{padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:background 0.12s;user-select:none}
.part-header:hover{background:var(--surface2)}
.part-pill{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--accent);background:var(--accent-light);border:1px solid var(--accent-mid);padding:2px 6px;border-radius:20px;letter-spacing:0.06em;white-space:nowrap}
.part-name{font-size:11px;font-weight:500;color:var(--text);flex:1;line-height:1.3}
.part-chevron{font-size:8px;color:var(--muted2);transition:transform 0.18s}
.part-group.open .part-chevron{transform:rotate(90deg)}
.lessons-list{display:none}
.part-group.open .lessons-list{display:block}
.lesson-item{padding:5px 16px 5px 40px;cursor:pointer;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:7px;border-left:2px solid transparent;transition:all 0.12s;line-height:1.3}
.lesson-item:hover{background:var(--accent-light);color:var(--text)}
.lesson-item.active{background:var(--accent-light);color:var(--accent);border-left-color:var(--accent);font-weight:500}
.lesson-item.done{color:var(--teal)}
.lesson-dot{width:4px;height:4px;border-radius:50%;background:var(--border);min-width:4px}
.lesson-item.active .lesson-dot{background:var(--accent)}
.lesson-item.done .lesson-dot{background:var(--teal)}
.diff-btn{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.06em;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all 0.12s;text-transform:uppercase}
.diff-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.diff-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.l0-pill{}
.co-pill{background:var(--accent-light);color:var(--accent);border-color:var(--accent-mid);}
.co-header{border-left:2px solid transparent;transition:all 0.12s;}
.co-active .co-header{background:var(--accent-light);border-left-color:var(--accent);}
.co-header:hover{background:var(--accent-light);}
.part-item:hover{background:var(--accent-light);color:var(--text)!important;}
.part-item.active{background:var(--accent-light);color:var(--accent)!important;border-left-color:var(--accent)!important;font-weight:700;}
.l0-header{border-left:2px solid transparent;transition:all 0.12s;}
.l0-active .l0-header{background:var(--accent-light);border-left-color:var(--accent);}
.l0-header:hover{background:var(--accent-light);}
.sidebar-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px}
.nav-link{font-size:11px;font-weight:500;color:var(--muted);padding:6px 10px;border-radius:6px;cursor:pointer;transition:all 0.12s;display:flex;align-items:center;gap:7px}
.nav-link:hover{background:var(--surface2);color:var(--text)}
.nav-link.active{background:var(--accent-light);color:var(--accent)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:11px 36px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:5}
.breadcrumb{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.breadcrumb-current{color:var(--accent);font-weight:600}
.topbar-right{display:flex;gap:7px;align-items:center}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:var(--surface);color:var(--text);transition:all 0.12s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:#1e4a7a;color:#fff}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.content{flex:1;padding:32px 40px 80px;max-width:820px}
.home-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:0.16em;color:var(--accent);text-transform:uppercase;font-weight:600;margin-bottom:12px}
.home-title{font-family:'Fraunces',serif;font-size:36px;font-weight:300;color:var(--text);line-height:1.12;letter-spacing:-0.02em;margin-bottom:12px}
.home-title em{font-style:italic;color:var(--accent)}
.home-desc{font-size:14px;color:var(--muted);max-width:520px;line-height:1.7;margin-bottom:28px}
.stats-row{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:28px}
.stat{flex:1;padding:16px 0;text-align:center;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-num{font-family:'Fraunces',serif;font-size:22px;font-weight:500;color:var(--accent);line-height:1;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:500;text-transform:uppercase;letter-spacing:0.06em;font-family:'IBM Plex Mono',monospace}
.parts-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.part-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.18s}
.part-card:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(42,92,143,0.10)}
.part-card-num{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent);font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:5px}
.part-card h3{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3}
.part-card p{font-size:11px;color:var(--muted);margin:0;line-height:1.5}
.section-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.14em;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.lesson-meta{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.lesson-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:0.1em;color:var(--accent);background:var(--accent-light);padding:3px 9px;border-radius:4px;text-transform:uppercase;border:1px solid var(--accent-mid)}
.lesson-num-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)}
.badge{font-size:10px;font-weight:500;padding:2px 8px;border-radius:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:0.04em}
.badge-time{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.badge-easy{background:var(--teal-light);color:var(--teal)}
.badge-medium{background:var(--amber-light);color:var(--amber)}
.badge-advanced{background:#F0EEFF;color:#5340B0}
.lesson-title{font-family:'Fraunces',serif;font-size:24px;font-weight:300;color:var(--text);line-height:1.2;margin-bottom:6px;letter-spacing:-0.015em}
.lesson-subtitle{font-size:13px;color:var(--muted);margin-bottom:26px;line-height:1.6}
.concepts-list{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color 0.12s}
.concept-card:hover{border-color:var(--accent-mid)}
.concept-card.open{border-color:var(--accent)}
.concept-head{padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.concept-toggle{width:16px;height:16px;min-width:16px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);transition:all 0.15s;margin-top:2px;font-weight:600}
.concept-card.open .concept-toggle{background:var(--accent);border-color:var(--accent);color:#fff}
.concept-text{flex:1}
.concept-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.concept-short{font-size:11px;color:var(--muted);line-height:1.4}
.concept-body{display:none;padding:0 14px 14px 40px;background:var(--accent-light);border-top:1px solid var(--accent-mid)}
.concept-card.open .concept-body{display:block}
.concept-explanation{font-size:13px;color:var(--text);line-height:1.7;padding-top:12px}
.ba-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:10px}
.ba-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ba-side{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.ba-label{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:7px;font-family:'IBM Plex Mono',monospace}
.ba-side.before .ba-label{color:var(--red)}
.ba-side.after .ba-label{color:var(--teal)}
.ba-content{font-size:11px;color:var(--muted);line-height:1.6;white-space:pre-wrap;font-family:'IBM Plex Mono',monospace}
.exercise-box{background:var(--surface);border:1px solid var(--border);padding:16px 18px;border-left:3px solid var(--accent);margin-bottom:10px;border-radius:0 8px 8px 0}
.exercise-label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:7px}
.exercise-text{color:var(--text);line-height:1.7;font-size:13px}
.prompt-block{background:#F8FAFF;border:1px solid var(--accent-mid);border-radius:8px;padding:14px 16px;margin:8px 0;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text);line-height:1.75;position:relative;white-space:pre-wrap;word-break:break-word}
.prompt-block::before{content:'STARTER PROMPT';display:block;font-size:8px;color:var(--accent);letter-spacing:0.14em;margin-bottom:8px;font-weight:600}
.prompt-block.agent{background:#F0FFF8;border:1px solid #9FE1CB;border-left:2px solid #1D9E75}
.prompt-block.agent::before{content:none}
.agent-badge{display:inline-flex;align-items:center;gap:4px;background:#1D9E75;border-radius:4px;padding:2px 8px;font-size:8px;font-weight:700;color:#fff;letter-spacing:0.1em;margin-bottom:8px}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--accent-light);border:1px solid var(--accent-mid);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;padding:3px 7px;border-radius:4px;cursor:pointer;letter-spacing:0.08em;transition:all 0.12s}
.copy-btn:hover{background:var(--accent);color:#fff}
.artifact-box{background:var(--amber-light);border:1px solid #F5D78A;border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:10px}
.artifact-icon{font-size:16px;line-height:1;padding-top:2px}
.artifact-label{font-family:'IBM Plex Mono',monospace;font-size:8px;font-weight:600;color:var(--amber);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:2px}
.artifact-name{color:#7A5000;font-size:12px;font-weight:500}
.quiz-section{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 18px}
.quiz-q{font-size:13px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5}
.quiz-options{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.quiz-opt{padding:8px 12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;color:var(--muted);transition:all 0.12s;background:var(--surface2)}
.quiz-opt:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.quiz-opt.correct{border-color:var(--teal);background:var(--teal-light);color:var(--teal);font-weight:500}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-light);color:var(--red)}
.quiz-feedback{font-size:12px;color:var(--muted);margin-top:6px;min-height:18px;line-height:1.5;font-weight:500}
.quiz-feedback.ok{color:var(--teal)}
.quiz-feedback.err{color:var(--red)}
.complete-bar{background:var(--surface);border-top:1px solid var(--border);padding:12px 40px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;bottom:0;box-shadow:0 -2px 8px rgba(0,0,0,0.04)}
.complete-hint{font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="brand-title">Claude Code for Everyone</div>
    <div class="brand-sub">Make your learning better</div>
    <div class="brand-sub">35 Lessons</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span>PROGRESS</span><span id="progress-pct">0 / 35</span></div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div id="diff-filter" style="padding:8px 12px 6px;border-bottom:1px solid var(--border);display:flex;gap:5px;flex-wrap:wrap">
    <button class="diff-btn active" data-diff="all" onclick="setDiff(this,'all')">All</button>
    <button class="diff-btn" data-diff="easy" onclick="setDiff(this,'easy')">Easy</button>
    <button class="diff-btn" data-diff="medium" onclick="setDiff(this,'medium')">Medium</button>
    <button class="diff-btn" data-diff="advanced" onclick="setDiff(this,'advanced')">Advanced</button>
  </div>
  <nav class="parts-nav" id="parts-nav"></nav>
  <div class="sidebar-footer">
    <div class="nav-link" id="nl-release" onclick="showReleaseNotes()">&#128203; Releases</div>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <div class="breadcrumb" id="breadcrumb"><span>Home</span></div>
    <div class="topbar-right" id="topbar-right"></div>
  </div>
  <div id="main-view"></div>
</main>
</div>
<script>
const DONE_KEY='cc4pm_v2_done';
let done=[];try{done=JSON.parse(localStorage.getItem(DONE_KEY)||'[]')}catch(e){}
function saveDone(){try{localStorage.setItem(DONE_KEY,JSON.stringify(done))}catch(e){}}

const lessonExamples = {"p1l1": {"before": "Meeting notes from yesterday: someone raised latency concerns, need to talk to design re the empty state, users confused — follow up, Q3 goal still tbd, a teammate has concerns", "after": "Problem Statement\\nUsers experiencing latency issues and confusion around empty states, impacting adoption.\\n\\nGoals\\n- Resolve latency concerns raised in eng sync\\n- Align with design on empty state treatment\\n\\nOpen Questions\\n- What is the Q3 adoption goal?\\n- What are the specific concerns raised by the team?"}, "p2l1": {"before": "50+ interviews completed with a specific user segment. Notes scattered across a dozen docs. You went in expecting UX complaints. Instead you keep hearing something structural: this segment uses the product differently from everyone else. You do not know yet what that means for the product.", "after": "Theme: This segment has a fundamentally different job to be done\\nFrequency: High — consistent across interviews\\nKey insight: This segment is not using the product for themselves — they are using it on behalf of others. The current flow was never designed for that.\\nSo what: One user intent does not fit all. Product direction changed: we built a dedicated flow for this segment rather than continuing to optimize a universal experience that did not fit their context."}, "p2l2": {"before": "You have internal feedback — NPS, support tickets, survey responses. It takes weeks to synthesize and by the time it is ready the team has already moved on to the next sprint. You suspect there is a faster signal somewhere.", "after": "After layering public community feedback alongside internal NPS and support data:\\nTop theme: Users attributed friction to one part of the product — but the pattern across sources showed the real issue was at the handoff between systems, not in any single team ownership area\\nPattern: Users could not tell what broke or where to go for help\\nSo what: The internal data was showing symptoms. The public data showed the cause. Combining both gave a clearer picture faster than either alone."}, "p2l3": {"before": "Three competitors you need to brief leadership on. You have tabs open from three different months, notes in two different docs, and a vague memory that one of them just changed their pricing model.", "after": "Competitor matrix: three players in the same space\\nFor each: core features, pricing model, target customer, recent changes\\nGap identified: None of them communicate system status to end users during failures — they all fail silently\\nTime: 25 minutes to build, ready for the leadership meeting"}, "p2l4": {"before": "You have synthesized the interviews for this segment and a clear pattern has emerged: this segment uses the product in a way the current flow does not support. That changes what needs to be built. But the platform mandate is to serve all segments consistently. You need a decision to go in a different direction.", "after": "Decision Brief: Dedicated flow for this segment\\nSituation: This segment represents a significant portion of the user base but operate in a context the current flow was not designed for.\\nFinding: This segment fails at a materially higher rate than others. The fix requires a purpose-built flow, not a copy or instruction change.\\nOptions: (A) Build a dedicated flow (B) Add contextual guidance to the existing flow (C) Treat as out of scope\\nRecommendation: Option A. Clear segment need, measurable outcome, scoped investment.\\nResult: Shipped. Meaningful improvement in conversion and task completion rates for this segment."}, "p3l1": {"before": "You describe a feature in a meeting. Design says they will mock it up next sprint. By the time it is ready the team has moved on and the feedback is stale.", "after": "You write a precise brief: user, context, job to be done, success condition. Claude builds a working prototype in 20 minutes. You share it in Slack that afternoon. Feedback arrives before the meeting ends."}, "p3l2": {"before": "You run a usability study. Recruiting takes 2 weeks. The prototype is already out of date. The report comes back 10 days later. By then the sprint is locked.", "after": "Monday 9am: prototype v1 shared with 3 users. Feedback captured in structured notes. Claude updates the prototype and synthesizes patterns by noon. Monday 2pm: prototype v2 tested with 3 more users. Two rounds of learning in one day. Hypothesis formed by end of day."}, "p3l3": {"before": "Three rounds of testing done. Lots of notes. Team meeting tomorrow. You are not sure what you learned or what to build. The meeting becomes a debate about opinions rather than a review of evidence.", "after": "Three rounds synthesized: the core flow is validated, one interaction pattern consistently confused users, one assumption was wrong. Hypothesis formed: changing the information hierarchy at step 2 will reduce drop-off. Spec written from the prototype, not from scratch. Eng picks it up with context already baked in."}, "p3l4": {"before": "Sprint planning. You describe a feature verbally. Design needs a week to mock it up. Eng estimates based on the verbal description. Three weeks later the first working version looks nothing like what anyone imagined.", "after": "You bring a working prototype to sprint planning. Design reacts to interaction patterns, not a description of them. Eng sees the intended behavior before writing a line of code. Estimate is grounded in something real. First production version is much closer to the intent. Revision cycle shrinks."}, "p4l1": {"before": "Engineer: the issue is in the OAuth token refresh handler in the auth middleware.\\nYou: got it. (You have no idea what that means or where to look.)", "after": "You: I looked at /src/auth/middleware.js — it looks like the token refresh only runs on page load, not on API calls. Is that what is causing the session drops?\\nEngineer: Exactly. You got it."}, "p4l2": {"before": "Your eng team builds shared capabilities that three other teams depend on. Each team wants status updates. Your tech lead is fielding questions from four directions and producing for none of them.", "after": "You own the communication layer. One async update per week, written clearly enough that all three offering teams get what they need without going directly to eng. Tech lead gets one decision per sprint pre-framed with options and your recommendation. Eng velocity increases. Your tech lead stops fielding the same question from three different Slack threads."}, "p4l3": {"before": "You are standardizing UX across three products that have diverged over time. Design shows you three sets of comps. You have opinions based on instinct, not the user research you just finished.", "after": "Feedback structured before the design review:\\nWhat research supports: This segment needs to see status information earlier in the flow — the comp addresses that well\\nSpecific concern: The error state uses red text only. 15% of users are colorblind and this is a high-stakes surface. Can we add an icon?\\nSigning off on: The overall flow sequence and the reconnect pattern\\nNot signing off yet: Error states across all three surfaces until we align on an accessibility standard\\nThe designer had something concrete to act on. Review took 25 minutes instead of 90."}, "p4l4": {"before": "You click through the happy path. Looks good. Ships. Three hours later a support ticket: what happens if I upload a file with a comma in the filename? Nobody thought of that.", "after": "Claude generates 23 edge cases from the spec. You test 10 of them. Finds 2 bugs. They are fixed before launch. Support ticket never arrives."}, "p5l1": {"before": "You need to answer a product question that requires joining three data tables. You have not written SQL in years. Asking the data team means a 3-day wait and you need this before tomorrow.", "after": "You describe the question to Claude in plain English. It writes the query, you run it, and in 15 minutes you have the answer: a small segment of your traffic is dramatically underperforming the rest. The problem is not product quality — it is routing and distribution. That single query changed the roadmap priority."}, "p5l2": {"before": "Your top-line metric has held steady for years. Leadership is confident. But when a team ships something, they cannot tell if the metric moved because of their work or despite it. The signal is real — the resolution is not.", "after": "Metric tree built underneath the top-line metric. Decomposed into the independent forces that drive it: coverage, flow completion by segment, lifecycle health, and session behavior. The top-line stays as the north star. Underneath it: faster, more specific indicators — each tied to a lever a team can actually pull. Now when something ships, the team can see which component moved and whether it held. The top-line metric got more meaningful, not replaced."}, "p5l3": {"before": "You have done the decomposition. You know which metrics explain the top-line. But getting three separate teams to adopt a shared measurement framework is not a small ask — and showing up with a deck of new metrics is not a recommendation anyone can act on.", "after": "Memo: Introduce operating metrics to give our top-line more signal and more levers.\\nRecommendation: Adopt a small set of leading indicators alongside the top-line — each one explains a different driver of it.\\nStrongest objection: We already have a metric. Why add more?\\nResponse: The top-line tells us where we are. The operating metrics tell us why we are there and what to do next. They make the existing metric more powerful, not redundant.\\nConfidence: High. Early cuts show the new indicators already explain recent movements in the top-line.\\nDecision needed: Before planning so teams can set roadmaps against the right levers."}, "p5l4": {"before": "Your team runs 1-2 experiments per month. Half do not reach significance before someone calls the result. The other half get shipped on instinct. You are rolling out a new experimentation platform and need teams to actually trust what it tells them.", "after": "First experiment on the new platform: a new payment method integration at checkout. Sample size calculated upfront. Runtime committed before launch. Result: +8% conversion, statistically significant. Shipped with confidence.\\nSix months later: 6+ experiments running per month across 25 teams. The shift was not the tool — it was designing the test before running it. Once teams committed to a sample size in advance, they stopped calling results early."}, "p6l1": {"before": "You need a PRD for a platform capability that touches multiple systems, multiple teams, and multiple user segments. The standard feature template has none of the right sections. You spend two hours on structure before writing a word of substance.", "after": "> Run PRD skill for [platform capability]\\n\\n[Claude reads your CLAUDE.md, understands the platform context and user segments. Generates a PRD with sections that fit a platform capability: problem framing, affected surfaces, success metrics by segment, rollout sequence, open questions by team. You start with substance, not structure.]"}, "p6l2": {"before": "You send a doc proposing a new operating metrics framework to sit alongside your top-line metric. The argument feels solid. Then in the review your VP asks: if we add three new metrics, how do we stop teams from optimizing for the easy one and ignoring the hard ones? You did not have an answer ready.", "after": "Before sending: you run the doc through Claude as your VP. It surfaces the gaming concern immediately. You add a section on how the metrics relate — they are components of the top-line, not independent targets, so optimizing one at the expense of another shows up in the composite. You run it as a team lead whose roadmap is already locked. Their objection: my team cannot absorb new measurement overhead mid-quarter. You add a phased adoption appendix. The actual review takes 20 minutes. Both objections come up. Both are already answered."}, "p6l3": {"before": "Signal is scattered across four tools — adoption in one dashboard, escalations in another, eng velocity in a tracker, risk flags in your CRM. Leadership wants a weekly update and you are assembling it by hand.", "after": "Raw input pasted Friday at 4pm: adoption numbers, this week escalations, two accounts flagged as at-risk, three capabilities shipped.\\nOutput 90 seconds later:\\nShipped: Core capability now live across all surfaces\\nIn Progress: Top migration milestones on track for next week\\nBlockers: Two accounts flagged at-risk — need outreach before Thursday\\nNext Week: Targeting next adoption milestone\\nLeadership read it in 3 minutes. One action item. Weekend intact."}, "p6l4": {"before": "12-slide deck. Slide 3: a chart with 8 lines and no title. Slide 7: a table with 40 rows. The audience reads the slides. You are not needed.", "after": "8-slide deck. Every slide has one point. The chart has one line highlighted. The table has 3 rows. The audience listens to you. You are the story."}, "p7l1": {"before": "Four projects. Each in a different folder with different naming. Some have CLAUDE.md, some do not. Skills scattered across the desktop. New session means starting from scratch.", "after": "One workspace. Every project has a CLAUDE.md. Skills live in /skills. Three commands, and Claude knows your entire context for the day."}, "p7l2": {"before": "Sprint planning prep: pull tickets from Jira, copy into Notion, write context for each, estimate effort, share with team. 2 hours every other week.", "after": "> Run sprint-prep workflow\\n\\n[Claude pulls tickets, adds context from strategy.md, estimates effort, formats for Notion]\\nTime: 8 minutes."}, "p7l3": {"before": "You run the same research synthesis every Monday, the same competitive check every quarter, the same status update every Friday. Each one takes 20-30 minutes. You do them manually because that is how the workflow was built.", "after": "Monday 8am: feedback digest waiting in Slack. Competitive changes digest waiting in your inbox. Friday 4pm: status update draft saved to your workspace, ready for your review. You did not trigger any of it. You just reviewed, adjusted where needed, and sent. 90 minutes of weekly manual work converted to 10 minutes of review."}, "p7l4": {"before": "You tell your team about Claude Code in a meeting. They nod. Two weeks later nobody has set it up. The idea dies.", "after": "You run a 15-minute demo on a problem your teammate is currently stuck on. They see it solve something real. They set it up that afternoon."}, "p8l1": {"before": "Every morning you open three dashboards, check the same metrics, compare to last week in your head, decide whether anything is worth investigating. 15 minutes every day, 5 days a week. Most days nothing has changed.", "after": "8am: Slack message from your pulse agent. Two metrics normal. One flagged — conversion dropped 12% vs 7-day average, outside the 8% threshold you set. Hypothesis attached: likely related to the deploy from yesterday. You investigate. The rest of your morning is uninterrupted."}, "p8l2": {"before": "Friday 4pm. You need to send a weekly update. You open four tabs — data warehouse, Jira, NPS dashboard, last week email. You spend 45 minutes assembling a picture of the week that everyone already mostly knows.", "after": "Friday 4pm: a Slack message appears in your team channel. Four bullets. What shipped, what moved, what to watch next week. Full report linked. You glance at it, make one edit, and leave for the weekend. The agent wrote it. You approved it."}, "p8l3": {"before": "Monday morning: someone on your team messages you — retention looks weird this week. You spend two hours pulling queries, building a metric tree, generating hypotheses, and working out which data check to run first.", "after": "Monday morning: you wake up to a Slack alert from Sunday night. Retention dropped 9% vs baseline — outside the 7% threshold. Attached: metric tree showing new user retention drove the drop, 3 ranked hypotheses, and the exact SQL to confirm the top one. You run the query. Confirmed in 4 minutes. Fix scoped before the morning meeting."}, "p8l4": {"before": "Four agents running. You think. You are not entirely sure which ones are still active, what they are watching, or whether the one that was pulling from Jira last month is still working after the API key rotated.", "after": "Agent registry: 4 agents documented, each with schedule, data sources, output location, and failure behavior. Weekly health check prompt run every Monday — all green. When the Jira token rotated, the status update agent failed loudly rather than silently, and the registry told you exactly what to fix."}, "p1l5": {"before": "Every Friday: open Claude, explain the format you want, paste notes, fix the output, repeat next week with the same setup.", "after": "> Run my weekly-status skill\\n\\n[Claude reads SKILL.md, pulls from your notes, outputs a formatted update in 20 seconds]"}, "p1l4": {"before": "You open Claude Code and type: build me a CLAUDE.md for my product. Claude writes one. It has the wrong context, wrong priorities, wrong tone. You spend 20 minutes fixing it.", "after": "Claude asks: what product is this for? Who are your users? What is the current phase? What decisions are you trying to inform? After 5 questions it summarizes the plan. You approve. The CLAUDE.md it writes needs one small tweak."}, "p1l2": {"before": "You open Claude Code and type: build me a CLAUDE.md for my product. Claude writes one. It has the wrong context, wrong priorities, wrong tone. You spend 20 minutes fixing it.", "after": "Claude asks: what product is this for? Who are your users? What is the current phase? What decisions are you trying to inform? After 5 questions it summarizes the plan. You approve. The CLAUDE.md it writes needs one small tweak."}, "p1l3": {"before": "Every session you spend the first few minutes re-explaining the same context. What the product is, who the users are, where you are in the roadmap, what the key tensions are. Claude starts fresh every time.", "after": "# your-project/CLAUDE.md\\nProduct: [your product name]\\nRole: [your role]\\nUsers: [your primary segments]\\nCurrent phase: [current phase]\\nKey tension: [main trade-off you are navigating]\\nOpen decisions: [the 2 most important decisions right now]\\n\\n[Claude reads this at session start. You never re-explain context again.]"}};

const curriculum = [
  {
    id:'p1',num:'L2',title:'Get started',
    subtitle:'Understand how Claude Code works, set it up to fit the way you work, and learn the most important habit before you build anything',
    lessons:[
      {id:'p1l1',num:'2.1',time:'30 min',difficulty:'easy',
        title:'How claude code works',
        subtitle:'Most people open Claude Code and treat it like a chat window. It is not. This lesson shows you what it actually is, how it differs from Claude.ai, and gets you through your first real session.',
        concepts:[
          {name:'The REPL Loop',desc:'How Claude Code processes your requests in a continuous cycle'},
          {name:'Context Window',desc:'The working memory Claude holds during a session'},

        exercise:'Open Claude Code in your terminal. Drop in a messy Slack thread or set of notes from a recent product discussion. Ask Claude to organize them into a PRD skeleton with sections for Problem, Goals, Non-Goals, and Success Metrics.',
        prompts:['/powerup — a built-in Claude Code command that teaches features through interactive animated lessons. Run it any time you want to discover what Claude Code can do.','Here are my raw notes from our planning meeting. Please organize these into a PRD skeleton with sections: Problem Statement, Goals, Non-Goals, Success Metrics, and Open Questions. Preserve the original intent but clean up the language.\n\n[paste your notes here]'],
        artifact:'A PRD skeleton generated from raw notes — your first proof that the tool works.',
        quiz:{q:'How does Claude Code differ from a standard chat interface?',opts:['Claude Code is faster','Claude Code can take actions and use tools, not just answer questions','Claude Code has a bigger context window','Claude Code is only for engineers'],correct:1,explain:'Claude Code is built for taking action — it can read files, run code, connect to tools, and take multi-step actions. Claude.ai is primarily a chat interface.'}
      },
      {id:'p1l2',num:'2.2',time:'30 min',difficulty:'easy',
        title:'Interview-first habit',
        subtitle:'The single most expensive mistake in Claude Code is asking it to build before you know what you actually need. This lesson teaches the interview-first habit — and why it changes everything.',
        concepts:[
          {name:'Interview Before Build',desc:'Claude asks you questions before writing a single file — the most important habit in the whole course'},
          {name:'Plan Mode',desc:'A structured sequence: interview, synthesize, get approval, then build. Nothing gets created until you sign off on the plan'},
          {name:'95% Confidence Threshold',desc:'Claude keeps asking until it can accurately explain back what you need — not what you said, what you actually need'},
          {name:'One Question at a Time',desc:'Sequential questioning forces depth. Ten questions at once gets shallow answers. One question at a time gets the real brief'}
        ],
        exercise:'Pick something you have been wanting to build or document — a spec, a workflow, a CLAUDE.md. Not sure what to pick? Use this: build a one-page onboarding guide for a new teammate. Before you ask Claude to build it, run the interview prompt. Let Claude ask you questions one at a time. When it summarizes, check: did it get it right? How different is the plan from what you would have asked for if you had just said build me X?',
        prompts:['Before you create any files or write any code, interview me. Ask me one question at a time until you have 95% confidence you understand what I actually need — not just what I said I want. When you are confident, summarize what you have learned and wait for my approval before proceeding.','I want to build [describe roughly what you want]. Before you start, ask me questions one at a time to understand: what problem this solves, who uses it, what success looks like, and what constraints I have not mentioned yet. Stop when you can summarize the plan back to me accurately.'],
        artifact:'An approved plan summary — built before a single file was written',
        quiz:{q:'What is the right order: interview, plan, or build?',opts:['Immediately — the sooner it starts the faster you iterate','After you describe what you want','After it has interviewed you, summarized the plan, and you have approved it','After the first draft fails'],correct:2,explain:'Nothing gets built until the plan is approved. The interview surfaces what you actually need. The summary is the forcing function. Approval is the gate. Build after that — not before.'}
      },
      {id:'p1l3',num:'2.3',time:'25 min',difficulty:'easy',
        title:'Stop re-explaining your project',

      {id:'p1l4',num:'2.4',time:'35 min',difficulty:'medium',
        title:'Builds the document architecture',
        subtitle:'One file is a note. Three files working together are a system. This lesson builds the document architecture that keeps every session grounded and every product decision traceable months later.',
        concepts:[
          {name:'project.md',desc:'Your source of truth — what the product is, who it serves, what success looks like'},

        exercise:'Step 1: Set up all three files for a real project — create project.md with what the product is and who it serves, strategy.md with the current direction, and an empty change_log.md. Step 2: Start a session in Claude.ai to think through a real product decision you are facing. Then open Claude Code, point it to your three files, and have it write the decision into strategy.md and log it with reasoning in change_log.md. Verify both files updated correctly before moving on.',
        prompts:['I have three files: project.md, strategy.md, and change_log.md. Please read project.md first, then help me think through [decision]. When we reach a conclusion, write it into strategy.md and log the decision with reasoning in change_log.md.'],

      {id:'p1l5',num:'2.5',time:'40 min',difficulty:'medium',

          {name:'Brief Iteration',desc:'When the first prototype is wrong, the brief was wrong — how to diagnose and fix it'}
        ],
        example:{before:'You describe a feature in a meeting. Design says they will mock it up next sprint. By the time it is ready the team has moved on and the feedback is stale.',after:'You write a precise brief: user, context, job to be done, what success looks like in the flow. Claude builds a working prototype in 20 minutes. You share it in Slack that afternoon. Feedback arrives before the meeting ends.'},
        exercise:'Pick a feature you have been thinking about but have not built yet. Write a brief — user, context, job to be done, and success condition. Ask Claude to build a working HTML prototype from it. If the first version is wrong, diagnose whether the brief was wrong and rewrite it. Get to something worth showing a user.',
        prompts:['I want to build a working prototype. Here is my brief:\n\nUser: [describe who this is for and their context]\nJob to be done: [what they are trying to accomplish]\nFlow: [describe each step]\nSuccess condition: [what does good look like at the end]\nConstraints: [anything Claude should know — mobile only, simple, no login, etc]\n\nBuild an HTML prototype I can open in a browser and share with users today.'],
        artifact:'A working HTML prototype and the brief that produced it',
        quiz:{q:'What is the single biggest factor in getting a useful prototype from Claude?',opts:['The complexity of the feature','The quality of the brief — the precision of the problem description','How much time you spend prompting','Whether you use HTML or React'],correct:1,explain:'Claude builds what you describe. Vague brief, vague prototype. The brief is the real skill — the prototype is just the output.'}
      },
      {id:'p3l2',num:'4.2',time:'50 min',difficulty:'medium',
        title:'Compress weeks of testing into a day',
        subtitle:'Traditional usability testing takes weeks. This lesson compresses the loop — multiple rounds of real feedback, prototype updated between each — into a single day.',
        concepts:[
          {name:'1 to 1.n',desc:'Running multiple rapid iteration cycles on a working prototype before writing production code'},
          {name:'Lightweight Usability Sessions',desc:'15-minute sessions with real users that produce actionable signal — not a formal study'},
          {name:'Structured Feedback Capture',desc:'Capturing what you observe in a format Claude can synthesize across rounds'},
          {name:'Between-Session Updates',desc:'Using Claude to update the prototype between sessions so each round tests something new'}
        ],
        example:{before:'You run a usability study. Recruiting takes 2 weeks. The prototype is already out of date. The report comes back 10 days later. By then the sprint is locked.',after:'Monday 9am: prototype v1 shared with 3 users. Feedback captured in structured notes. Claude updates the prototype and synthesizes patterns by noon. Monday 2pm: prototype v2 tested with 3 more users. Two rounds of learning in one day. Hypothesis formed by end of day.'},
        exercise:'Take the prototype from lesson 3.1. Identify 3 people you can show it to — a teammate, a colleague, a friend. They do not need to match your target user exactly — even someone unfamiliar with the problem will surface usability issues. Run a 15-minute session with each. Capture structured observations. Ask Claude to synthesize patterns across the three sessions and update the prototype. Run one more round with the updated version.',
        prompts:['I just ran [N] usability sessions on my prototype. Here are my structured observations from each session:\n\n[paste session notes]\n\nPlease: (1) identify the top 3 patterns across all sessions, (2) separate observations about the flow from observations about the UI, (3) flag anything users did that surprised you, (4) recommend the highest-impact change for the next prototype version, (5) update the prototype with that change.'],
        artifact:'A multi-round tested prototype and a synthesis showing what each round changed',
        quiz:{q:'What makes same-day iteration faster than a traditional research cycle?',opts:['It is less rigorous','It is faster because you skip synthesis','You update the prototype between rounds and test again — the loop closes in hours, not weeks','You need fewer participants'],correct:2,explain:'The power is in the loop. Each round informs the next. By the time you form a hypothesis you have evidence from multiple iterations, not just one session.'}
      },
      {id:'p3l3',num:'4.3',time:'35 min',difficulty:'medium',
        title:'Knowing when you have learned enough',
        subtitle:'Knowing when to stop iterating is as important as knowing how to start. This lesson shows you how to recognize diminishing returns, synthesize your test rounds, and write a hypothesis worth shipping.',
        concepts:[
          {name:'Diminishing Return Signal',desc:'How to recognize when additional iteration rounds are producing noise, not signal'},
          {name:'Learning Synthesis',desc:'Combining observations across multiple rounds into a coherent picture of what users need'},
          {name:'The Hypothesis Statement',desc:'A specific, testable prediction about what will happen when you ship — and how you will measure it'},
          {name:'From Prototype to Spec',desc:'What the prototype and test rounds tell eng and design before a line of production code is written'}
        ],
        example:{before:'Three rounds of testing done. Lots of notes. Team meeting tomorrow. You are not sure what you learned or what to build. The meeting becomes a debate about opinions rather than a review of evidence.',after:'Three rounds synthesized: the core flow is validated, one interaction pattern consistently confused users, one assumption was wrong. Hypothesis formed: changing the information hierarchy at step 2 will reduce drop-off. Spec written from the prototype, not from scratch. Eng picks it up with context already baked in.'},
        exercise:'Take the feedback and iterations from lesson 3.2. Ask Claude to synthesize everything across all rounds into a single learning document. Identify where you have confidence and where you do not. Write a hypothesis statement for what you will ship. Decide: what does success look like in the data after you ship it?',
        prompts:['Here are my notes and observations from [N] rounds of prototype testing:\n\n[paste all session notes and iteration decisions]\n\nPlease: (1) synthesize the top 3 things we learned with confidence, (2) identify what we still do not know, (3) draft a hypothesis statement in the format: we believe [change] will result in [outcome] because [evidence], (4) list what this prototype tells eng and design that a spec written from scratch would not.'],
        artifact:'A synthesis document and a shippable hypothesis — evidence, prediction, and measure',
        quiz:{q:'What signal tells you iteration has done its job?',opts:['When you run out of time','When the team agrees the prototype looks good','When additional rounds are producing the same observations and you have a clear hypothesis you can measure','When eng says they are ready'],correct:2,explain:'You stop when you are learning less with each round and you have a specific, testable prediction about what will happen when you ship. That is the signal that iteration has done its job.'}
      },
      {id:'p3l4',num:'4.4',time:'45 min',difficulty:'advanced',
        title:'Vibe coding as catalyst',
        subtitle:'A prototype is not a finished product — it is a shared language. This lesson shows you how to bring a Claude-generated prototype into a triad session and collapse the brief-to-build cycle from weeks to hours.',
        concepts:[
          {name:'You as Catalyst',desc:'Your role in vibe coding is not to build everything alone — it is to produce a working artifact that collapses the abstraction gap for design and eng'},
          {name:'Shared Working Surface',desc:'A prototype everyone can react to in the same room — faster than a PRD, more concrete than a wireframe'},
          {name:'Design Handoff',desc:'What design needs from a Claude prototype to take it further — and what they do not need to rebuild from scratch'},
          {name:'Eng Handoff',desc:'How a prototype changes the eng conversation — from estimating an abstraction to reacting to something real'},
          {name:'Guardrails',desc:'What vibe coding is not — when to slow down, when to stop, and when production code needs to be written properly'}
        ],
        example:{before:'Sprint planning. You describe a feature verbally. Design needs a week to mock it up. Eng estimates based on the verbal description. Three weeks later the first working version looks nothing like what anyone imagined. Two more weeks of revision.','after':'You bring a working prototype to sprint planning. Design reacts to interaction patterns, not a description of them. Eng sees the intended behavior before writing a line of code. Estimate is grounded in something real. First production version is much closer to the intent. Revision cycle shrinks.'},
        exercise:'Take the prototype and hypothesis from lessons 3.1-3.3. Bring it into a working session with your designer and tech lead. Have design identify what they would change and what they can build from. Have eng identify what the prototype tells them about scope and feasibility. Update the prototype based on their input. Document what each triad member now knows that they did not know before the session.',
        prompts:['I have a working prototype that has been through [N] rounds of user testing. I am about to share it with my designer and tech lead. Please help me prepare:\n(1) A brief framing for the designer — what the prototype is trying to solve, what we learned from users, and what I want their reaction on\n(2) A brief framing for the tech lead — what the prototype is showing, what the open technical questions are, and what I need from them before we write a spec\n(3) A list of decisions this session should produce so we leave with alignment, not more questions'],
        artifact:'A session plan, a reacted-to prototype, and a post-session doc with decisions owned',
        quiz:{q:'What does a prototype give design and engineering that a verbal description cannot?',opts:['To build the entire product alone using Claude','To write all the code and hand it to eng to clean up','To produce a working artifact that collapses the abstraction gap — giving design and eng something real to react to instead of a description','To replace the need for design and engineering'],correct:2,explain:'Vibe coding is not about replacing their triad. It is about using Claude to produce a working artifact fast enough that design and eng can react to something real — which is faster, more aligned, and more accurate than building from a verbal description or a static spec.'}
      }
    ]
  },
  {
    id:'p4',num:'L5',title:'Work better with your team',
    subtitle:'Knowing how to use Claude is only half the skill. This part teaches how you work alongside engineering and design across the full delivery cycle — from spec to launch.',
    lessons:[
      {id:'p4l1',num:'5.1',time:'30 min',difficulty:'easy',
        title:'Read code like a map',
        subtitle:'You do not need to write code to navigate a codebase. This lesson shows you how to read one like a map — understanding what it does, how it is organized, and where the user-facing features live.',
        concepts:[
          {name:'File Structure',desc:'How codebases are organized and what each folder signals'},
          {name:'Code as a Map',desc:'Reading for intent and structure, not syntax'},
          {name:'Plain-English Tours',desc:'Asking Claude to explain any file in language you can use'},
          {name:'Data Models',desc:'What the database schema tells you about product decisions made long ago'}
        ],
        example:{before:'Engineer: the issue is in the OAuth token refresh handler in the auth middleware.\nYou: got it. (You have no idea what that means or where to look.)',after:'You: I looked at /src/auth/middleware.js — it looks like the token refresh only runs on page load, not on API calls. Is that what is causing the session drops?\nEngineer: Exactly. You got it.'},
        exercise:'Clone a public open-source project. Ask Claude to give you a high-level tour: what it does, how it is organized, where the key user-facing features live.',
        prompts:['I have cloned this repo. Give me a high-level tour: (1) what this product does in one sentence, (2) how the codebase is organized — key folders and what they contain, (3) where the main user-facing features are implemented, (4) what the database models tell us about the data model. Explain as if I have never read code before.'],
        artifact:'A plain-English repo tour — what it does, how it is organised, where features live',
        quiz:{q:'What changes when you can read a codebase without writing code?',opts:['To replace engineers','To write code faster','To ask better questions and catch scope issues earlier','It is not useful'],correct:2,explain:'Reading code is not about writing it — it is about navigating it like a map. Those who can do this have more precise conversations with eng and catch expensive misalignments before they ship.'}
      },
      {id:'p4l2',num:'5.2',time:'35 min',difficulty:'medium',
        title:'Specs that give eng enough context',
        subtitle:'The most common source of eng friction is a spec that arrived without enough context. This lesson shows you how to pair with your tech lead in a way that speeds them up instead of slowing them down.',
        concepts:[
          {name:'Spec Readiness',desc:'The bar a spec needs to clear before eng picks it up'},
          {name:'Proposing Changes',desc:'Structuring a change request so eng can move without back-and-forth'},
          {name:'Unblocking vs. Deciding',desc:'When to step in vs. when to let eng figure it out'},
          {name:'Async Communication',desc:'How to communicate with eng in a way that respects deep work'}
        ],
        example:{before:'You finish the research, know what to build, and write the spec. Three days after handing it to engineering there are 14 Slack messages. The spec described what to build but not the context the user operates in. That context changes how the flow needs to work.',after:'Spec sent then user context mapped explicitly in design review then edge cases documented before eng picks it up then 2 clarifying questions from eng (expected) then ships then measurable improvement in segment conversion.\nThe difference: the spec was grounded in actual user context before engineering touched it.'},
        exercise:'Pick a feature currently in development. Use Claude to draft a spec readiness checklist, an async update request to your tech lead, and a list of decisions you own vs. decisions you should defer to eng.',
        prompts:['I am working with my tech lead on [feature]. Please help me: (1) create a spec readiness checklist — what should be resolved before eng picks up a ticket, (2) draft an async status update request that respects their focus time, (3) list the decisions I own vs. the ones I should defer to eng judgment.'],
        artifact:'A spec readiness checklist and an async update template your tech lead will actually read',
        quiz:{q:'What is the most common cause of eng friction after a spec is handed over?',opts:['Daily status check-ins','Clear decisions made upfront so they can build without constant interruption','More detailed specs','Faster approvals'],correct:1,explain:'Engineers do their best work with clear direction and uninterrupted time. Your job is to front-load the decisions so eng can move fast once they start.'}
      },
      {id:'p4l3',num:'5.3',time:'35 min',difficulty:'medium',
        title:'Feedback grounded in research',
        subtitle:'Design feedback based on personal taste creates friction. Design feedback grounded in user research creates alignment. This lesson teaches you the difference and shows you how to structure every design review.',
        concepts:[
          {name:'Design Review Structure',desc:'How to run a review that generates useful feedback, not opinion soup'},
          {name:'Needs vs. Solutions',desc:'Separating what users need from how design chose to solve it'},
          {name:'Research-Grounded Feedback',desc:'Using what you learned in testing to make feedback specific rather than subjective'},
          {name:'Approval vs. Sign-off',desc:'When you approve direction vs. when design owns the final call'}
        ],
        example:{before:'You are standardizing UX across three products that have diverged over time. Design shows you three sets of comps. You have opinions based on instinct, not the user testing you just finished.',after:'Feedback structured before the design review:\nWhat research supports: this segment needs to see status information earlier in the flow — the comp addresses that well\nSpecific concern: The error state uses red text only. 15% of users are colorblind and this is a high-stakes surface. Can we add an icon?\nSigning off on: The overall flow sequence and the reconnect pattern\nNot signing off yet: Error states across all three surfaces until we align on an accessibility standard\nThe designer had something concrete to act on. Review took 25 minutes instead of 90.'},
        exercise:'Take a recent design comp you need to review. Use Claude to structure your feedback into: what user research supports, specific elements to reconsider, questions for the designer, and what you are signing off on.',
        prompts:['I need to review this design comp for [feature]. Help me structure my feedback: (1) what user needs does this address well, (2) what specific elements raise questions — framed in user terms not aesthetics, (3) questions to bring to the designer, (4) what I am prepared to sign off on.'],
        artifact:'A structured review — what research supports, what to reconsider, what you are signing off on',
        quiz:{q:'What is the difference between an opinion and useful design feedback?',opts:['Useful feedback is longer','Useful feedback is specific, tied to a user need or constraint — not personal aesthetic preference','Useful feedback praises more than it critiques','Useful feedback comes from you alone'],correct:1,explain:'"This feels busy" is a feeling. "The primary action is competing with 4 other elements at the same visual weight" is a specific problem a designer can solve.'}
      },
      {id:'p4l4',num:'5.4',time:'40 min',difficulty:'medium',
        title:'Own the last 20%',
        subtitle:'Most launches fail in the last 20% — not because of bad code, but because of untested edge cases and unclear handoffs. This lesson covers QA, launch readiness, and how to read a pull request before it ships.',
        concepts:[
          {name:'QA',desc:'What to test before eng closes a ticket'},
          {name:'Edge Case Thinking',desc:'Using Claude to find the scenarios eng did not spec for'},
          {name:'Launch Readiness',desc:'The checklist that keeps you from discovering problems in production'},
          {name:'Participating in Code Review',desc:'What to look for in a pull request — scope, user impact, and what changed beyond the spec'}
        ],
        example:{before:'You click through the happy path. Looks good. Ships. Three hours later a support ticket: what happens if I upload a file with a comma in the filename? Nobody thought of that.',after:'Claude generates 23 edge cases from the spec. You test 10 of them. Finds 2 bugs. They are fixed before launch. Support ticket never arrives.'},
        exercise:'Take a feature currently in QA or recently shipped. Use Claude to generate a comprehensive edge case list from the spec. Test the top 5 you are most worried about. Extension: if you have access to a recent pull request, paste the diff and ask Claude to explain what it changes in plain English — then leave one meaningful comment. If you do not have a real PR, ask Claude to generate a sample diff for a simple feature so you can practice reading one.',
        prompts:['Here is the spec for [feature]: [paste]. Please generate: (1) a comprehensive edge case list grouped by category (empty states, error states, permissions, data limits, concurrent users), (2) the 5 most likely to cause a user-facing bug, (3) a QA checklist I can run before sign-off.\n\nAlso here is a recent PR diff: [paste]. Please explain what this changes in plain English and suggest 2-3 questions I should ask before it ships.'],
        artifact:'An edge case list, a pre-launch QA checklist, and one meaningful PR comment',
        quiz:{q:'What does QA look like when it is done well before launch?',opts:['To replace QA engineers','To test the happy path only','To think about edge cases, user-facing errors, and scenarios the spec did not anticipate','To approve the final design'],correct:2,explain:'Eng QA tests functionality. QA tests reality — the weird inputs, the empty states, the users who do things in the wrong order. Both are needed.'}
      }
    ]
  },
  {
    id:'p5',num:'L6',title:'Let data guide you',
    subtitle:'Gut feel is not a strategy. This part teaches you to pull answers from data, diagnose metric movements, and back every recommendation with evidence.',
    lessons:[
      {id:'p5l1',num:'6.1',time:'35 min',difficulty:'easy',
        title:'Ask data questions in plain english',
        subtitle:'You should not need a data analyst to answer a product question. This lesson shows you how to ask questions in plain English and get SQL answers — no query experience required.',
        concepts:[
          {name:'Natural Language to SQL',desc:'Ask in English; Claude writes the query'},
          {name:'Result Interpretation',desc:'Making sense of what the numbers actually say'},
          {name:'Iterative Analysis',desc:'Drilling from broad to specific across multiple questions'},
          {name:'Data Quality',desc:'Knowing when to trust a number and when to question it'}
        ],
        exercise:'Drop in a CSV or describe your data schema. Ask 3 real product questions you have been wanting answers to. No data access right now? Describe a fictional product schema — for example: users, sessions, events, subscriptions — and Claude will write real queries you can verify the logic of. Get answers, then drill into the most interesting one with 2 follow-up questions.',
        prompts:['Here is my dataset / schema: [describe or paste]. I have 3 product questions: (1) [question], (2) [question], (3) [question]. For each: write the SQL, show the result, interpret it in plain English, flag any data quality concerns.','§AGENT§I want to turn my most important recurring data question into a scheduled agent. The question: [describe]. Data source: [warehouse/schema]. Please: (1) write the SQL, (2) set up a daily schedule, (3) compare to previous day and flag changes, (4) deliver plain-English interpretation to Slack every morning.'],
        artifact:'Three answered product questions, the queries that produced them, and one drill-down',
        quiz:{q:'What is the most dangerous assumption when reading data on your own?',opts:['The charts look bad','Confusing correlation with causation — seeing a pattern and assuming it explains behavior','The queries are slow','You cannot share results'],correct:1,explain:'Two things moving together does not mean one caused the other. Good analysis generates alternative explanations and tests them before drawing conclusions.'}
      },
      {id:'p5l2',num:'6.2',time:'40 min',difficulty:'medium',
        title:'Decompose before you guess',
        subtitle:'When a metric moves unexpectedly, guessing is expensive. This lesson builds a metric tree to decompose the move into components — so you diagnose what actually happened before deciding what to do.',
        concepts:[
          {name:'Metric Trees',desc:'Breaking a top-line number into the components that drive it'},
          {name:'Decomposition',desc:'Isolating which component actually moved'},
          {name:'Hypothesis Generation',desc:'Creating testable explanations before diving into data'},
          {name:'Evidence Matching',desc:'Connecting each hypothesis to data that confirms or denies it'}
        ],
        exercise:'Pick a metric that moved recently. Build a metric tree with Claude. Generate 5 hypotheses ranked by likelihood. Design a quick data check for the top 2.',
        prompts:['This metric moved: [metric] went [direction] by [amount] over [time period]. Please: (1) build a metric tree of components that roll up to this metric, (2) generate 5 ranked hypotheses for what drove the change, (3) for the top 2, tell me what data I need to confirm or deny them.','§AGENT§I want to automate this diagnosis. Build an agent that watches [metric] daily against a [7/30-day] baseline, triggers when movement exceeds [X%], then: (1) runs metric tree decomposition, (2) generates 3 ranked hypotheses, (3) writes SQL for the top hypothesis, (4) sends Slack alert with diagnostic in thread.'],
        artifact:'A metric tree, ranked hypotheses, and the data check that confirms or rules out each one',
        quiz:{q:'What does decomposing a metric tell you that the metric itself does not?',opts:['A chart of metric trends over time','A breakdown of a top-line metric into the components that drive it','A list of your team KPIs','A forecasting tool'],correct:1,explain:'A metric tree decomposes a top-line number into its drivers. It shows you where in the system something changed — which is the only way to diagnose a move without guessing.'}
      },
      {id:'p5l3',num:'6.3',time:'35 min',difficulty:'medium',
        title:'Analysis that drives a decision',
        subtitle:'Analysis is only as useful as the decision it drives. This lesson shows you how to turn data findings into a structured recommendation memo that stakeholders trust — and act on.',
        concepts:[
          {name:'Evidence Chain',desc:'The logical path from data to conclusion to recommendation'},
          {name:'Confidence Levels',desc:'Being honest about how strong your evidence actually is'},
          {name:'Preempting Objections',desc:'Addressing the counterargument before it is raised in the meeting'},
          {name:'Decision Trigger',desc:'What specifically you are asking the stakeholder to decide'}
        ],
        exercise:'Take the analysis from lesson 5.2. Write a recommendation memo. Ask Claude to play a skeptical VP and pressure-test it before you send it.',
        prompts:['Here is my analysis: [paste]. Help me write a recommendation memo: the recommendation in one sentence, 3 data points that support it, the strongest counterargument and my response, my confidence level and why, what would change my recommendation. Then critique it as a skeptical VP would.','§AGENT§I want an agent that generates a recommendation memo every Friday from [data source]. It should: (1) pull this week metrics, (2) compare to last week and 30-day trend, (3) identify the top movement and draft a memo with evidence and confidence level, (4) save to insights/[date].md and post a summary to [Slack channel].'],
        artifact:'A memo with evidence, confidence level stated, and the top objection already addressed',
        quiz:{q:'Why does being explicit about uncertainty make a recommendation stronger?',opts:['It makes you look uncertain','It tells stakeholders how much to weight this input — and builds credibility through honesty','Recommendations should always sound certain','It is required by data teams'],correct:1,explain:'Stating uncertainty counterintuitively builds trust. "High confidence" on a big call signals that you know the difference between strong evidence and a hunch.'}
      },
      {id:'p5l4',num:'6.4',time:'40 min',difficulty:'advanced',
        title:'Experiments that mean something',
        subtitle:'Most teams call experiments early, run them too short, or misread the results. This lesson shows you how to design a valid test, calculate the right sample size, and make the correct call when results arrive.',
        concepts:[
          {name:'Experiment Design',desc:'The structure of a valid test — what you are changing and what you are measuring'},
          {name:'Sample Size',desc:'How many users you need before the result means anything'},
          {name:'Statistical Significance',desc:'What p < 0.05 actually means in plain English'},
          {name:'Decision Framework',desc:'Ship, iterate, or stop — how to decide from the result'}
        ],
        exercise:'Design a real test for a feature you are planning. Use Claude to calculate the sample size. Interpret a set of sample results. Decide: ship, iterate, or stop.',
        prompts:['I want to design a test for [feature]. Metric: [metric]. Baseline: [number]. Minimum detectable effect: [X%]. Please: (1) calculate the sample size I need, (2) estimate runtime given [traffic] users/week, (3) list 3 things that could invalidate this test, (4) generate sample results I can practice interpreting.','§AGENT§I want an experiment monitoring agent. Experiment: [describe]. Metric: [metric]. Baseline: [number]. MDE: [X%]. Every day it should: (1) query results from [data source], (2) calculate significance and projected time to significance, (3) flag guardrail metric changes, (4) send a Slack update with go/no-go recommendation when significance is reached.'],
        artifact:'A complete experiment design — hypothesis, sample size, runtime, and how to read the result',
        quiz:{q:'What is the practical meaning of a statistically significant result?',opts:['The result is important','The result is unlikely to be due to random chance — we have enough data to trust it','The sample size was large enough','The test ran long enough'],correct:1,explain:'Significance means: the probability this result happened by chance is below our threshold (usually 5%). It does not mean the effect is large — just that it is real.'}
      }
    ]
  },
  {
    id:'p6',num:'L7',title:'Say it clearly',
    subtitle:'The best ideas stall because they are hard to communicate. This part teaches you to write docs, updates, and presentations that are faster to produce and easier to act on.',
    lessons:[
      {id:'p6l1',num:'7.1',time:'35 min',difficulty:'easy',
        title:'PRD process that improves every time',
        subtitle:'Every PRD you write should make the next one faster. This lesson builds a PRD skill that learns your style and improves every time you use it.',
        concepts:[
          {name:'PRD Structure',desc:'The sections that make a PRD actionable vs. aspirational'},
          {name:'Skill Iteration',desc:'Improving the skill based on each output — not starting over'},
          {name:'Style Calibration',desc:'Teaching Claude your writing preferences once, not every session'},
          {name:'Reuse',desc:'One skill that works for any feature — not a template you copy-paste'}
        ],
        exercise:'Build a PRD skill. Use it to generate a PRD for a real feature. Note 3 things to improve. Update the skill. Run it again. The second one should be noticeably better.',
        prompts:['Help me build a PRD SKILL.md. My PRDs should: [describe style and required sections]. Include: a template with placeholders, instructions for handling ambiguous inputs, examples of tone. Generate the full SKILL.md file.'],
        artifact:'A PRD skill and a real PRD it produced — the second one should be noticeably better',
        quiz:{q:'What makes a reusable skill more valuable than a saved prompt over time?',opts:['Skills are longer','A skill compounds — it improves each time and works for any future PRD without rewriting','Prompts expire','Skills are more secure'],correct:1,explain:'A saved prompt is static. A skill is a system. Every PRD you write teaches you what the skill should do differently — and you update it accordingly.'}
      },
      {id:'p6l2',num:'7.2',time:'30 min',difficulty:'easy',
        title:'Find the flaws before they do',
        subtitle:'The meeting is the wrong place to discover a flaw in your argument. This lesson surfaces the hard questions before your stakeholders do.',
        concepts:[
          {name:'Stakeholder Perspectives',desc:'Instructing Claude to think from a specific role — not generically'},
          {name:'Objection Surfacing',desc:'Finding the hard questions before the meeting does'},
          {name:'Pre-Mortem Thinking',desc:'Assuming the project failed and working backwards to why'},
          {name:'Revision Before Review',desc:'Arriving with objections already addressed'}
        ],
        exercise:'Take a doc you have written. Run it through 3 simulated reviews: VP Engineering (technical risk), a skeptical customer (value and disruption), your CFO (cost and ROI). Revise based on what surfaces.',
        prompts:['Here is my doc: [paste]. Review it three times from different perspectives: (1) VP Engineering — technical risk and scope, (2) a skeptical enterprise customer — value and disruption to their workflow, (3) CFO — cost, ROI, and opportunity cost. Give me the top 3 objections from each.'],
        artifact:'A stronger doc with objections pre-answered — and a reusable objection log for future reviews',
        quiz:{q:'What does assuming failure in advance reveal that optimistic planning misses?',opts:['Reviewing a project after it fails','Assuming the project already failed and working backwards to find why — before it happens','A final review before launch','A budget review'],correct:1,explain:'A pre-mortem asks: it is 6 months from now and this failed — what went wrong? It surfaces risks that optimistic planning tends to skip over.'}
      },
      {id:'p6l3',num:'7.3',time:'20 min',difficulty:'easy',
        title:'Status updates in under two minutes',
        subtitle:'Status updates should take two minutes, not twenty. This lesson shows you how to generate a polished weekly update from raw notes, tickets, and messages.',
        concepts:[
          {name:'Source Ingestion',desc:'Pulling content from wherever your week actually lived'},
          {name:'Update Structure',desc:'Shipped / In Progress / Blockers / Next Week — the format that scans'},
          {name:'Audience Calibration',desc:'What your VP needs vs. what your team needs'},
          {name:'Time Saved',desc:'This task used to take 20 minutes. Now it takes 2.'}
        ],
